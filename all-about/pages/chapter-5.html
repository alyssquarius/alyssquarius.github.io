<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chapter 05 — Video Theater</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --sky:#C9A96E;
  --sky-deep:#A07840;
  --sky-light:#E8D5A3;
  --sky-pale:#F5EDD9;
  --navy:#0E0B12;
  --navy-mid:#1A1425;
  --navy-surface:#231B30;
  --navy-card:#2A2040;
  --white:#F5EDD9;
  --muted:#9B8FA0;
  --gold:#C9A96E;
  --rose:#B5636A;
  --text:#EDE4D3;
}
html{scroll-behavior:smooth;}
body{background:var(--navy);color:var(--text);font-family:'Jost',sans-serif;font-weight:300;overflow-x:hidden;cursor:none;}

/* cursor */
.cursor{position:fixed;width:8px;height:8px;background:var(--sky);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s;}
.cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(135,206,235,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .12s ease-out;}

/* canvas */
#starCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}

/* sparkle */
.sparkle{position:fixed;pointer-events:none;z-index:9997;font-size:16px;animation:sparklePop .6s ease forwards;}
@keyframes sparklePop{0%{opacity:1;transform:scale(0) rotate(-20deg);}50%{opacity:1;transform:scale(1.2) rotate(10deg);}100%{opacity:0;transform:scale(.8) rotate(20deg) translateY(-30px);}}

/* toast */
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy-surface);border:1px solid rgba(135,206,235,0.25);color:var(--white);padding:.75rem 1.5rem;font-size:.75rem;letter-spacing:.1em;opacity:0;transition:all .3s;pointer-events:none;z-index:200;white-space:nowrap;border-radius:2px;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* music */
.music-btn{position:fixed;bottom:2rem;right:2rem;width:44px;height:44px;background:var(--navy-surface);border:1px solid rgba(135,206,235,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:none;z-index:100;transition:all .2s;}
.music-btn:hover{background:rgba(135,206,235,0.15);border-color:var(--sky);}
.eq{display:flex;gap:2px;align-items:flex-end;height:16px;}
.eq-bar{width:3px;background:var(--sky);border-radius:1px;animation:eqAnim 1s ease-in-out infinite;}
.eq-bar:nth-child(1){animation-delay:0s;}.eq-bar:nth-child(2){animation-delay:.2s;}.eq-bar:nth-child(3){animation-delay:.4s;}
@keyframes eqAnim{0%,100%{height:4px;}50%{height:14px;}}
.eq.paused .eq-bar{animation-play-state:paused;height:8px;}

/* petals / clouds */
.petals-container{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.petal{position:absolute;top:-40px;border-radius:50%;animation:petalFall linear infinite;opacity:0;}
@keyframes petalFall{0%{transform:translateY(0) rotate(0deg) translateX(0);opacity:0;}5%{opacity:.7;}90%{opacity:.3;}100%{transform:translateY(110vh) rotate(720deg) translateX(40px);opacity:0;}}

/* reveal */
.reveal{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease;}
.revealed{opacity:1;transform:translateY(0);}

/* section */
.section{position:relative;z-index:1;padding:6rem 2rem;max-width:960px;margin:0 auto;}
.section-label{font-size:.65rem;letter-spacing:.4em;text-transform:uppercase;color:var(--sky);margin-bottom:1rem;text-align:center;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:300;text-align:center;color:var(--white);margin-bottom:3rem;}

/* hero */
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;z-index:1;}
.hero-tag{font-weight:200;font-size:.7rem;letter-spacing:.35em;text-transform:uppercase;color:var(--sky);margin-bottom:2rem;opacity:0;animation:fadeUp .8s .3s ease forwards;}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(3.5rem,10vw,7rem);font-weight:300;line-height:1;color:var(--white);opacity:0;animation:fadeUp .9s .5s ease forwards;}
.hero-title em{font-style:italic;color:var(--sky-light);}
.hero-subtitle{font-size:.85rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:1.5rem;opacity:0;animation:fadeUp .8s .8s ease forwards;}
.divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--sky),transparent);margin:2.5rem auto;opacity:0;animation:fadeUp .6s 1s ease forwards;}
.scroll-hint{position:absolute;bottom:2.5rem;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:.5rem;color:var(--muted);font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;text-align:center;opacity:0;animation:fadeUp .6s 1.5s ease forwards;}
.scroll-line{width:1px;height:40px;background:linear-gradient(to bottom,var(--sky),transparent);animation:scrollAnim 2s 2s ease-in-out infinite;}
@keyframes scrollAnim{0%,100%{opacity:.3;transform:scaleY(1);}50%{opacity:1;transform:scaleY(.6);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
@keyframes bump{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}

/* counter */
.countdown-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(135,206,235,0.15);border:1px solid rgba(135,206,235,0.15);border-radius:2px;overflow:hidden;margin-bottom:1.5rem;}
.cd-cell{background:var(--navy-mid);padding:2.5rem 1rem;text-align:center;}
.cd-num{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,8vw,5rem);font-weight:300;color:var(--sky-light);line-height:1;display:block;}
.cd-num.bump{animation:bump .15s ease;}
.cd-label{display:block;font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-top:.75rem;}
.cd-status{text-align:center;font-size:.8rem;color:var(--muted);letter-spacing:.05em;}
.cd-bar-wrap{background:rgba(135,206,235,0.1);border-radius:99px;height:4px;overflow:hidden;margin:1.5rem 0 .5rem;}
.cd-bar{height:100%;background:linear-gradient(90deg,var(--sky-deep),var(--sky-light));border-radius:99px;transition:width 1s ease;width:0%;}
.cd-progress-label{text-align:center;font-size:.7rem;color:var(--muted);letter-spacing:.1em;margin-bottom:1rem;}

/* unlock btn */
.unlock-btn{display:block;margin:2.5rem auto 0;padding:1rem 3rem;background:transparent;border:1px solid var(--sky);color:var(--sky);font-family:'Jost',sans-serif;font-size:.75rem;letter-spacing:.3em;text-transform:uppercase;cursor:none;position:relative;overflow:hidden;transition:color .3s;}
.unlock-btn::before{content:"";position:absolute;inset:0;background:var(--sky);transform:translateX(-101%);transition:transform .4s cubic-bezier(.77,0,.18,1);z-index:0;}
.unlock-btn:hover::before{transform:translateX(0);}
.unlock-btn:hover{color:var(--navy);}
.unlock-btn span{position:relative;z-index:1;}
.unlock-btn:disabled{opacity:.35;}

/* message box */
.message-box{background:var(--navy-surface);border:1px solid rgba(135,206,235,0.15);padding:3rem;position:relative;}
.message-box::before{content:'"';font-family:'Cormorant Garamond',serif;font-size:8rem;color:rgba(135,206,235,0.06);position:absolute;top:-.5rem;left:1.5rem;line-height:1;}
.message-text{font-family:'Cormorant Garamond',serif;font-size:clamp(1.1rem,3vw,1.4rem);font-style:italic;color:var(--white);line-height:1.8;text-align:center;position:relative;z-index:1;}
.message-sig{text-align:center;margin-top:2rem;font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:var(--sky);}

/* chapters grid */
.chapters-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1px;background:rgba(135,206,235,0.08);border:1px solid rgba(135,206,235,0.08);}
.chapter-card{background:var(--navy-mid);padding:2rem;position:relative;overflow:hidden;transition:background .3s;cursor:none;text-decoration:none;display:block;color:inherit;}
.chapter-card:hover{background:var(--navy-surface);}
.chapter-card::after{content:"";position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--sky),transparent);transform:scaleX(0);transition:transform .4s;}
.chapter-card:hover::after{transform:scaleX(1);}
.ch-mood{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--sky);margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem;}
.ch-mood::before{content:"";display:inline-block;width:20px;height:1px;background:var(--sky);}
.ch-num{font-family:'Cormorant Garamond',serif;font-size:4rem;font-weight:300;color:rgba(135,206,235,0.08);line-height:1;position:absolute;top:1.2rem;right:1.5rem;user-select:none;transition:color .3s;}
.chapter-card:hover .ch-num{color:rgba(135,206,235,0.18);}
.ch-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:400;color:var(--white);margin-bottom:.75rem;margin-top:.5rem;}
.ch-desc{font-size:.78rem;color:var(--muted);line-height:1.7;letter-spacing:.02em;}
.ch-open{display:inline-flex;align-items:center;gap:.4rem;margin-top:1.5rem;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--sky);}

/* footer */
footer{position:relative;z-index:1;text-align:center;padding:3rem 2rem;color:var(--muted);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;border-top:1px solid rgba(135,206,235,0.08);}
footer strong{color:var(--sky);font-weight:400;}

/* chapter page shared */
.ch-page{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:6rem 2rem 4rem;}
.ch-back{display:inline-flex;align-items:center;gap:.5rem;font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);text-decoration:none;margin-bottom:3rem;transition:color .2s;cursor:none;}
.ch-back:hover{color:var(--sky);}
.ch-back::before{content:'←';}
.ch-next-page{display:block;margin:3rem auto 0;padding:1rem 3rem;background:transparent;border:1px solid var(--sky);color:var(--sky);font-family:'Jost',sans-serif;font-size:.75rem;letter-spacing:.3em;text-transform:uppercase;cursor:none;position:relative;overflow:hidden;transition:color .3s;text-decoration:none;text-align:center;width:fit-content;}
.ch-next-page::before{content:"";position:absolute;inset:0;background:var(--sky);transform:translateX(-101%);transition:transform .4s cubic-bezier(.77,0,.18,1);z-index:0;}
.ch-next-page:hover::before{transform:translateX(0);}
.ch-next-page:hover{color:var(--navy);}
.ch-next-page span{position:relative;z-index:1;}
.ch-page-label{font-size:.65rem;letter-spacing:.4em;text-transform:uppercase;color:var(--sky);margin-bottom:1rem;}
.ch-page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3rem);font-weight:300;color:var(--white);margin-bottom:2.5rem;}

/* ── INTERACTIVE FEATURES ── */

/* Ch1: Time Capsule */
.capsule-input{background:var(--navy-mid);border:1px solid rgba(135,206,235,0.2);color:var(--white);font-family:'Cormorant Garamond',serif;font-size:1.1rem;padding:1rem 1.25rem;resize:vertical;min-height:120px;outline:none;transition:border-color .2s;width:100%;}
.capsule-input:focus{border-color:var(--sky);}
.capsule-input::placeholder{color:var(--muted);font-style:italic;}
.capsule-btn{display:block;margin:.75rem 0 0;padding:.9rem 2rem;background:transparent;border:1px solid var(--sky);color:var(--sky);font-family:'Jost',sans-serif;font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;cursor:none;position:relative;overflow:hidden;transition:color .3s;width:100%;}
.capsule-btn::before{content:"";position:absolute;inset:0;background:var(--sky);transform:translateX(-101%);transition:transform .4s cubic-bezier(.77,0,.18,1);z-index:0;}
.capsule-btn:hover::before{transform:translateX(0);}
.capsule-btn:hover{color:var(--navy);}
.capsule-btn span{position:relative;z-index:1;}
.capsule-entries{margin-top:2rem;display:flex;flex-direction:column;gap:.75rem;}
.capsule-entry{background:var(--navy-surface);border-left:2px solid var(--sky);padding:1rem 1.25rem;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;color:var(--white);line-height:1.6;}
.capsule-entry-meta{font-size:.65rem;color:var(--muted);margin-top:.5rem;letter-spacing:.1em;font-style:normal;font-family:'Jost',sans-serif;}
.capsule-empty{text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--muted);padding:2rem;font-size:1rem;}

/* Ch2: Gallery */
.gallery-wrap{background:var(--navy-mid);border:1px solid rgba(135,206,235,0.1);overflow:hidden;position:relative;}
.gallery-slides{display:flex;transition:transform .6s cubic-bezier(.77,0,.18,1);}
.gallery-slide{min-width:100%;display:flex;flex-direction:column;align-items:center;padding:2.5rem 2rem;gap:1.25rem;text-align:center;}
.gallery-placeholder{width:100%;max-width:480px;height:260px;background:var(--navy-surface);border:1px dashed rgba(135,206,235,0.2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;color:var(--muted);font-size:.8rem;letter-spacing:.1em;}
.gallery-placeholder svg{width:36px;height:36px;opacity:.3;}
.gallery-caption{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.2rem;color:var(--white);}
.gallery-date{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--sky);}
.gallery-nav{display:flex;justify-content:center;align-items:center;gap:1.5rem;padding:1.25rem;border-top:1px solid rgba(135,206,235,0.08);}
.gallery-nav-btn{background:transparent;border:1px solid rgba(135,206,235,0.25);color:var(--sky);padding:.5rem 1.25rem;cursor:none;font-family:'Jost',sans-serif;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;transition:all .2s;}
.gallery-nav-btn:hover{background:rgba(135,206,235,0.1);border-color:var(--sky);}
.gallery-dots{display:flex;gap:.5rem;}
.gallery-dot{width:6px;height:6px;border-radius:50%;background:rgba(135,206,235,0.2);transition:background .3s,transform .3s;cursor:none;}
.gallery-dot.active{background:var(--sky);transform:scale(1.4);}
.gallery-counter{font-size:.65rem;letter-spacing:.2em;color:var(--muted);min-width:40px;text-align:center;}

/* Ch3: Flip Cards */
.reasons-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;}
.reason-card-wrap{perspective:900px;height:160px;cursor:none;}
.reason-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .65s cubic-bezier(.4,0,.2,1);}
.reason-card.flipped{transform:rotateY(180deg);}
.reason-front,.reason-back{position:absolute;inset:0;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.25rem;text-align:center;border:1px solid rgba(135,206,235,0.12);}
.reason-front{background:var(--navy-mid);}
.reason-back{background:var(--navy-surface);transform:rotateY(180deg);border-color:rgba(135,206,235,0.25);}
.reason-num{font-family:'Cormorant Garamond',serif;font-size:2.8rem;color:rgba(135,206,235,0.15);line-height:1;}
.reason-hint{font-size:.58rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-top:.4rem;}
.reason-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.95rem;color:var(--white);line-height:1.5;}
.reason-icon{font-size:1.4rem;margin-bottom:.5rem;}
.reasons-progress{text-align:center;margin-top:1.5rem;font-size:.7rem;color:var(--muted);letter-spacing:.1em;}

/* Ch4: Coupons */
.coupon-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;}
.coupon-card{background:var(--navy-mid);border:1px solid rgba(135,206,235,0.1);padding:0;position:relative;cursor:none;overflow:hidden;transition:border-color .3s;}
.coupon-card:hover{border-color:rgba(135,206,235,0.3);}
.coupon-inner{padding:1.75rem 1.5rem 1.25rem;}
.coupon-top{display:flex;align-items:flex-start;gap:1rem;margin-bottom:.75rem;}
.coupon-icon-wrap{width:48px;height:48px;background:rgba(135,206,235,0.08);border:1px solid rgba(135,206,235,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.4rem;}
.coupon-info{flex:1;}
.coupon-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--white);margin-bottom:.25rem;}
.coupon-desc{font-size:.72rem;color:var(--muted);line-height:1.6;}
.coupon-footer{border-top:1px dashed rgba(135,206,235,0.12);margin:0 1.5rem;padding:1rem 0;}
.coupon-redeem-btn{width:100%;background:transparent;border:1px solid rgba(135,206,235,0.25);color:var(--sky);font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;padding:.5rem;cursor:none;transition:all .2s;font-family:'Jost',sans-serif;}
.coupon-redeem-btn:hover{background:rgba(135,206,235,0.08);border-color:var(--sky);}
.coupon-card.redeemed{opacity:.45;}
.coupon-stamp{position:absolute;top:1rem;right:1rem;font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--rose);border:1px solid var(--rose);padding:.2rem .5rem;transform:rotate(8deg);}

/* Ch5: Theater */
.theater-wrap{background:#000510;border:1px solid rgba(135,206,235,0.08);overflow:hidden;}
.theater-header{padding:1rem 1.5rem;border-bottom:1px solid rgba(135,206,235,0.08);display:flex;align-items:center;gap:.75rem;}
.theater-dots{display:flex;gap:.4rem;}
.theater-dot-r{width:10px;height:10px;border-radius:50%;background:#FF5F57;}
.theater-dot-y{width:10px;height:10px;border-radius:50%;background:#FFBD2E;}
.theater-dot-g{width:10px;height:10px;border-radius:50%;background:#28CA41;}
.theater-brand{font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);flex:1;text-align:center;}
.theater-screen{width:100%;aspect-ratio:16/9;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;position:relative;overflow:hidden;}
.theater-screen iframe{width:100%;height:100%;border:none;position:absolute;inset:0;}
.theater-icon{font-size:3rem;opacity:.15;}
.theater-idle-text{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--muted);font-size:.9rem;}
.theater-controls{padding:1.25rem 1.5rem;display:flex;gap:.75rem;align-items:center;border-top:1px solid rgba(135,206,235,0.06);}
.theater-url-input{flex:1;background:var(--navy-mid);border:1px solid rgba(135,206,235,0.15);color:var(--white);font-family:'Jost',sans-serif;font-size:.8rem;padding:.65rem 1rem;outline:none;transition:border-color .2s;}
.theater-url-input:focus{border-color:var(--sky);}
.theater-url-input::placeholder{color:var(--muted);}
.theater-load-btn{background:var(--sky-deep);border:none;color:var(--white);font-family:'Jost',sans-serif;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;padding:.65rem 1.25rem;cursor:none;transition:opacity .2s;white-space:nowrap;}
.theater-load-btn:hover{opacity:.8;}

/* Ch6: Typewriter */
.letter-envelope{background:var(--navy-surface);border:1px solid rgba(135,206,235,0.15);padding:3.5rem 3rem;position:relative;overflow:hidden;}
.letter-envelope::before{content:'"';font-family:'Cormorant Garamond',serif;font-size:10rem;color:rgba(135,206,235,0.04);position:absolute;top:-1rem;left:1rem;line-height:1;pointer-events:none;}
.letter-envelope::after{content:'"';font-family:'Cormorant Garamond',serif;font-size:10rem;color:rgba(135,206,235,0.04);position:absolute;bottom:-3rem;right:1rem;line-height:1;pointer-events:none;}
.letter-text{font-family:'Cormorant Garamond',serif;font-size:clamp(1.05rem,2.5vw,1.3rem);font-style:italic;color:var(--white);line-height:1.9;text-align:center;position:relative;z-index:1;min-height:3em;}
.letter-cursor{display:inline-block;width:2px;height:1.1em;background:var(--sky);vertical-align:middle;animation:blink .8s step-end infinite;margin-left:2px;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.letter-sig{text-align:center;margin-top:2.5rem;font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:var(--sky);opacity:0;transition:opacity 1s;}
.letter-sig.show{opacity:1;}
.letter-actions{display:flex;justify-content:center;gap:1rem;margin-top:1.5rem;}
.letter-btn{background:transparent;border:1px solid rgba(135,206,235,0.2);color:var(--muted);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;padding:.5rem 1.25rem;cursor:none;font-family:'Jost',sans-serif;transition:all .2s;}
.letter-btn:hover{border-color:var(--sky);color:var(--sky);}
.letter-speed-indicator{text-align:center;font-size:.65rem;color:var(--muted);letter-spacing:.1em;margin-top:.5rem;}

@media(max-width:600px){
  .countdown-grid{grid-template-columns:repeat(2,1fr);}
  .cd-cell{padding:1.5rem .5rem;}
  .chapters-grid{grid-template-columns:1fr;}
  .reasons-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>
  <canvas id="starCanvas"></canvas>
  <div class="petals-container" id="petals"></div>

<main class="ch-page">
  <a href="../index.html" class="ch-back">Kembali</a>
  <div class="ch-page-label">Chapter 05 — Cinematic</div>
  <h2 class="ch-page-title">Video Theater</h2>

  <div class="theater-wrap">
    <div class="theater-header">
      <div class="theater-dots">
        <div class="theater-dot-r"></div>
        <div class="theater-dot-y"></div>

  <div style="margin-top:2rem;background:var(--navy-surface);border:1px solid rgba(135,206,235,0.1);padding:1.5rem;">
    <p style="font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--sky);margin-bottom:1rem;">Playlist Kenangan</p>
    <div id="playlist" style="display:flex;flex-direction:column;gap:.5rem;"></div>

      <input id="pl-name" style="flex:1;background:var(--navy-mid);border:1px solid rgba(135,206,235,0.15);color:var(--white);font-size:.75rem;padding:.5rem .75rem;outline:none;" placeholder="Nama video (opsional)"/>
      <button onclick="addToPlaylist()" style="background:rgba(135,206,235,0.1);border:1px solid rgba(135,206,235,0.25);color:var(--sky);font-size:.65rem;letter-spacing:.15em;padding:.5rem .75rem;cursor:none;font-family:'Jost',sans-serif;">+ Tambah</button>

  <button class="music-btn" id="musicBtn">
    <div class="eq paused" id="eq"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>
  </button>
  <script>
    // cursor
    const cursor=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';});
    (function a(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(a);})();

    // sparkle
    const sp=['✦','✧','★','✸','❄'];
    document.addEventListener('click',e=>{const el=document.createElement('div');el.className='sparkle';el.textContent=sp[Math.floor(Math.random()*sp.length)];el.style.left=e.clientX+'px';el.style.top=e.clientY+'px';el.style.color=`hsl(${38+Math.random()*20},${60+Math.random()*30}%,${60+Math.random()*20}%)`;document.body.appendChild(el);setTimeout(()=>el.remove(),700);});

    // stars
    const cv=document.getElementById('starCanvas'),cx=cv.getContext('2d');
    let W,H,stars=[],ss=[];
    function ic(){W=cv.width=innerWidth;H=cv.height=innerHeight;stars=Array.from({length:250},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+.2,a:Math.random(),sp:Math.random()*.003+.001,ph:Math.random()*Math.PI*2}));}
    function ds(t){cx.clearRect(0,0,W,H);
      for(const s of stars){const al=s.a*(.4+.6*Math.sin(t*s.sp*60+s.ph));cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(232,213,163,${al})`;cx.fill();}
      for(let i=ss.length-1;i>=0;i--){const s=ss[i];s.x+=s.vx;s.y+=s.vy;s.life--;
        const al=s.life/s.ml,g=cx.createLinearGradient(s.x,s.y,s.x-s.vx*14,s.y-s.vy*14);
        g.addColorStop(0,`rgba(232,213,163,${al})`);g.addColorStop(1,'rgba(232,213,163,0)');
        cx.beginPath();cx.strokeStyle=g;cx.lineWidth=1.5;cx.moveTo(s.x,s.y);cx.lineTo(s.x-s.vx*14,s.y-s.vy*14);cx.stroke();
        if(s.life<=0)ss.splice(i,1);
      }
      if(Math.random()<.005&&ss.length<4){const a=-Math.PI/6+(Math.random()-.5)*.5;ss.push({x:Math.random()*W,y:Math.random()*H*.5,vx:Math.cos(a)*9,vy:Math.sin(a)*9+4,life:55,ml:55});}
      requestAnimationFrame(ds);
    }
    ic();addEventListener('resize',ic);requestAnimationFrame(ds);

    // petals (blue bubbles)
    const pc=document.getElementById('petals');
    function cp(){const p=document.createElement('div');p.className='petal';
      const sz=4+Math.random()*8;
      p.style.left=Math.random()*100+'vw';p.style.width=sz+'px';p.style.height=sz+'px';
      p.style.background=`rgba(${181},${99+Math.random()*20},${106+Math.random()*10},${.2+Math.random()*.3})`;
      const dur=10+Math.random()*10;p.style.animationDuration=dur+'s';p.style.animationDelay=Math.random()*6+'s';
      pc.appendChild(p);setTimeout(()=>p.remove(),(dur+6)*1000);}
    setInterval(cp,500);for(let i=0;i<10;i++)cp();

    // toast
    const toast=document.getElementById('toast');let tt;
    function showToast(m){toast.textContent=m;toast.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>toast.classList.remove('show'),3000);}

    // music
    const mb=document.getElementById('musicBtn'),eq=document.getElementById('eq');
    let ac,gn,pl=false,osc=[];
    function startMusic(){ac=new(AudioContext||webkitAudioContext)();gn=ac.createGain();gn.gain.setValueAtTime(0,ac.currentTime);gn.gain.linearRampToValueAtTime(.05,ac.currentTime+2);gn.connect(ac.destination);
      [261.63,329.63,392,523.25,659.25].forEach((f,i)=>{const o=ac.createOscillator(),og=ac.createGain();o.type='sine';o.frequency.value=f;og.gain.setValueAtTime(0,ac.currentTime);og.gain.linearRampToValueAtTime(1,ac.currentTime+i*.8+1.5);
        const lf=ac.createOscillator(),lg=ac.createGain();lf.frequency.value=.15+i*.04;lg.gain.value=.4;lf.connect(lg);lg.connect(o.frequency);lf.start();o.connect(og);og.connect(gn);o.start();osc.push({o,og,lf});});}
    function stopMusic(){if(gn){gn.gain.linearRampToValueAtTime(0,ac.currentTime+1.5);setTimeout(()=>{osc.forEach(x=>{try{x.o.stop();x.lf.stop();}catch(e){}});ac.close();},1600);}}
    mb.addEventListener('click',()=>{pl=!pl;if(pl){startMusic();eq.classList.remove('paused');showToast('♪ Musik menyala');}else{stopMusic();eq.classList.add('paused');showToast('♪ Musik dimatikan');}});

    // reveal
    document.querySelectorAll('.reveal').forEach(el=>{new IntersectionObserver(([e])=>{if(e.isIntersecting){el.classList.add('revealed');}},{threshold:.1}).observe(el);});
  </script>

  <script>
  function getYtId(url){
    const m1=url.match(/youtube\.com\/watch\?v=([^&]+)/);
    const m2=url.match(/youtu\.be\/([^?]+)/);
    return m1?m1[1]:m2?m2[1]:null;
  }

  function loadVideo(url){
    const u=url||document.getElementById('theater-url').value.trim();
    const id=getYtId(u);
    if(!id){showToast('Link YouTube tidak valid');return;}
    document.getElementById('theater-screen').innerHTML=`<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    showToast('Selamat menonton ✦');
  }

  document.getElementById('theater-url').addEventListener('keydown',e=>{if(e.key==='Enter')loadVideo();});

  function addToPlaylist(){
    const url=document.getElementById('pl-url').value.trim();
    const name=document.getElementById('pl-name').value.trim()||'Video';
    if(!getYtId(url)){showToast('Link tidak valid');return;}
    const pl=JSON.parse(localStorage.getItem('theater_playlist')||'[]');
    pl.push({url,name});
    localStorage.setItem('theater_playlist',JSON.stringify(pl));
    document.getElementById('pl-url').value='';
    document.getElementById('pl-name').value='';
    renderPlaylist();
    showToast(name+' ditambahkan ✦');
  }

  function renderPlaylist(){
    const pl=JSON.parse(localStorage.getItem('theater_playlist')||'[]');
    const el=document.getElementById('playlist');
    if(!pl.length){el.innerHTML='<p style="font-size:.75rem;color:var(--muted);font-style:italic;">Belum ada video. Tambahkan di atas!</p>';return;}
    el.innerHTML=pl.map((v,i)=>`
      <div style="display:flex;align-items:center;gap:.75rem;padding:.5rem .75rem;background:var(--navy-mid);border:1px solid rgba(135,206,235,0.08);">
        <div style="width:48px;height:32px;background:#000;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--muted);">▶</div>
        <span style="flex:1;font-size:.8rem;color:var(--white);">${v.name}</span>
        <button onclick="loadVideo('${v.url}')" style="background:rgba(135,206,235,0.08);border:1px solid rgba(135,206,235,0.2);color:var(--sky);font-size:.6rem;padding:.3rem .75rem;cursor:none;font-family:'Jost',sans-serif;">Putar</button>
        <button onclick="removePlaylist(${i})" style="background:none;border:none;color:var(--muted);font-size:.75rem;cursor:none;">×</button>
      </div>`).join('');
  }

  function removePlaylist(i){
    const pl=JSON.parse(localStorage.getItem('theater_playlist')||'[]');
    pl.splice(i,1);localStorage.setItem('theater_playlist',JSON.stringify(pl));
    renderPlaylist();
  }

  renderPlaylist();
</script>
