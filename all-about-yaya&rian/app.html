<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>All About — Yaya & Rian</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0E0B12;overflow:hidden;}
#site-frame{position:fixed;inset:0;width:100%;height:100%;border:none;}
#yt-wrap{position:fixed;bottom:-9999px;left:-9999px;width:1px;height:1px;pointer-events:none;z-index:-1;}
</style>
</head>
<body>
<iframe id="site-frame" src="main.html" allowfullscreen></iframe>
<div id="yt-wrap"><div id="yt-player"></div></div>
<script>
// ── LAGU PER CHAPTER ──
// Ganti video ID dan judul sesuai lagu yang kamu mau nanti
const CHAPTER_SONGS = {
  'main.html':      { id: 'E07s5ZYygMg', title: "Keshi — It's You" },
  'chapter-1.html': { id: 'E07s5ZYygMg', title: "Keshi — It's You" },
  'chapter-2.html': { id: 'E07s5ZYygMg', title: "Keshi — It's You" },
  'chapter-3.html': { id: 'E07s5ZYygMg', title: "Keshi — It's You" },
  'chapter-4.html': { id: 'E07s5ZYygMg', title: "Keshi — It's You" },
  'chapter-5.html': { id: 'E07s5ZYygMg', title: "Keshi — It's You" },
  'chapter-6.html': { id: 'E07s5ZYygMg', title: "Keshi — It's You" },
};

let player = null;
let isPlaying = true;
let currentSong = CHAPTER_SONGS['main.html'];

// Load YouTube API
const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);

window.onYouTubeIframeAPIReady = function() {
  player = new YT.Player('yt-player', {
    videoId: currentSong.id,
    playerVars: {
      autoplay: 1,
      loop: 1,
      playlist: currentSong.id,
      controls: 0,
      disablekb: 1,
      fs: 0,
      modestbranding: 1,
    },
    events: {
      onReady: function(e) {
        e.target.setVolume(40);
        e.target.playVideo();
        broadcastStatus(true);
      },
      onStateChange: function(e) {
        if (e.data === YT.PlayerState.PLAYING) {
          isPlaying = true;
          broadcastStatus(true);
        } else if (e.data === YT.PlayerState.PAUSED) {
          isPlaying = false;
          broadcastStatus(false);
        }
      }
    }
  });
};

function broadcastStatus(playing) {
  const frame = document.getElementById('site-frame');
  if (frame && frame.contentWindow) {
    try { frame.contentWindow.postMessage({ type: 'MUSIC_STATUS', playing }, '*'); }
    catch(e) {}
  }
}

function changeSong(songKey) {
  const song = CHAPTER_SONGS[songKey];
  if (!song || !player) return;

  // Kalau lagu sama, tidak perlu ganti — biarkan lanjut
  if (song.id === currentSong.id) return;

  currentSong = song;

  // Ganti lagu tanpa berhenti
  player.loadVideoById({
    videoId: song.id,
    suggestedQuality: 'small'
  });
  player.setLoop(true);

  // Update playlist loop untuk lagu baru
  setTimeout(() => {
    try { player.setLoop(true); } catch(e) {}
  }, 1000);
}

window.addEventListener('message', function(e) {
  if (!e.data || !e.data.type) return;

  if (e.data.type === 'MUSIC_TOGGLE') {
    if (!player) return;
    if (player.getPlayerState() === 1) player.pauseVideo();
    else player.playVideo();
  }

  if (e.data.type === 'NAVIGATE') {
    const frame = document.getElementById('site-frame');
    if (!frame) return;
    frame.src = e.data.url;

    // Deteksi chapter dari URL dan ganti lagu
    const urlParts = e.data.url.split('/');
    const pageName = urlParts[urlParts.length - 1].split('?')[0];
    changeSong(pageName);
  }

  if (e.data.type === 'GET_STATUS') {
    broadcastStatus(isPlaying);
  }
});
</script>
</body>
</html>
