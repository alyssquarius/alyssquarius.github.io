<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chapter 02 — Gallery Kita</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#C9A96E;--gold-light:#E8D5A3;--rose:#B5636A;--deep:#0E0B12;--mid:#1A1425;--surface:#231B30;--cream:#F5EDD9;--text:#EDE4D3;--muted:#9B8FA0;}
html{scroll-behavior:smooth;}
body{background:var(--deep);color:var(--text);font-family:'Jost',sans-serif;font-weight:300;overflow-x:hidden;cursor:none;}
.cursor{position:fixed;width:8px;height:8px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
.cursor-ring{position:fixed;width:30px;height:30px;border:1px solid rgba(201,169,110,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .12s ease-out;}
#starCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.sparkle{position:fixed;pointer-events:none;z-index:9997;font-size:16px;animation:sparklePop .6s ease forwards;}
@keyframes sparklePop{0%{opacity:1;transform:scale(0) rotate(-20deg);}50%{opacity:1;transform:scale(1.2) rotate(10deg);}100%{opacity:0;transform:scale(.8) rotate(20deg) translateY(-30px);}}
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid rgba(201,169,110,0.25);color:var(--cream);padding:.75rem 1.5rem;font-size:.75rem;letter-spacing:.1em;opacity:0;transition:all .3s;pointer-events:none;z-index:200;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.petals-container{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.petal{position:absolute;top:-40px;border-radius:60% 40% 60% 40%;animation:petalFall linear infinite;opacity:0;}
@keyframes petalFall{0%{transform:translateY(0) rotate(0deg);opacity:0;}5%{opacity:1;}90%{opacity:.5;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
.music-btn{position:fixed;bottom:2rem;right:2rem;width:44px;height:44px;background:var(--surface);border:1px solid rgba(201,169,110,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:none;z-index:100;transition:all .2s;}
.music-btn:hover{background:rgba(201,169,110,0.15);border-color:var(--gold);}
.eq{display:flex;gap:2px;align-items:flex-end;height:16px;}
.eq-bar{width:3px;background:var(--gold);border-radius:1px;animation:eqAnim 1s ease-in-out infinite;}
.eq-bar:nth-child(1){animation-delay:0s;}.eq-bar:nth-child(2){animation-delay:.2s;}.eq-bar:nth-child(3){animation-delay:.4s;}
@keyframes eqAnim{0%,100%{height:4px;}50%{height:14px;}}
.eq.paused .eq-bar{animation-play-state:paused;height:8px;}
.ch-page{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:6rem 2rem 4rem;}
.ch-back{display:inline-flex;align-items:center;gap:.5rem;font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);text-decoration:none;margin-bottom:3rem;transition:color .2s;cursor:none;}
.ch-back:hover{color:var(--gold);}
.ch-back::before{content:'←';}
.ch-next-page{display:block;margin:3rem auto 0;padding:1rem 3rem;background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:'Jost',sans-serif;font-size:.75rem;letter-spacing:.3em;text-transform:uppercase;cursor:none;position:relative;overflow:hidden;transition:color .3s;text-decoration:none;text-align:center;width:fit-content;}
.ch-next-page::before{content:"";position:absolute;inset:0;background:var(--gold);transform:translateX(-101%);transition:transform .4s cubic-bezier(.77,0,.18,1);z-index:0;}
.ch-next-page:hover::before{transform:translateX(0);}
.ch-next-page:hover{color:var(--deep);}
.ch-next-page span{position:relative;z-index:1;}
.ch-page-label{font-size:.65rem;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;}
.ch-page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3rem);font-weight:300;color:var(--cream);margin-bottom:2.5rem;}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<canvas id="starCanvas"></canvas>
<div class="petals-container" id="petals"></div>
<div class="toast" id="toast"></div>

<main class="ch-page">
  <a href="../index.html" class="ch-back">Kembali</a>
  <div class="ch-page-label">Chapter 02 — Snapshot</div>
  <h2 class="ch-page-title">Gallery Kita</h2>

  <div id="collage-empty" style="text-align:center;padding:4rem 2rem;border:1px dashed rgba(201,169,110,0.15);margin-bottom:1.5rem;">
    <div style="font-size:3rem;opacity:.15;margin-bottom:1rem;">📷</div>
    <p style="font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--muted);font-size:1rem;">Belum ada foto. Upload di bawah untuk mulai ✦</p>
  </div>

  <div id="collage-header" style="display:none;justify-content:space-between;align-items:center;margin-bottom:.75rem;">
    <p style="font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);" id="collage-count">0 foto</p>
    <button onclick="clearAll()" style="background:transparent;border:1px solid rgba(181,99,106,0.3);color:var(--rose);font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:.3rem .75rem;cursor:none;font-family:'Jost',sans-serif;transition:all .2s;" onmouseover="this.style.background='rgba(181,99,106,0.08)'" onmouseout="this.style.background='transparent'">Hapus Semua</button>
  </div>

  <div id="collage-scroll" style="display:none;overflow-y:auto;max-height:600px;padding-right:4px;margin-bottom:1.5rem;">
    <div id="collage-grid" style="columns:2 160px;gap:8px;"></div>
  </div>

  <div id="lightbox" style="display:none;position:fixed;inset:0;background:rgba(10,8,16,.95);z-index:400;align-items:center;justify-content:center;flex-direction:column;gap:1rem;padding:2rem;">
    <button onclick="closeLightbox()" style="position:absolute;top:1.5rem;right:1.5rem;background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:none;line-height:1;" onmouseover="this.style.color='var(--cream)'" onmouseout="this.style.color='var(--muted)'">×</button>
    <img id="lb-img" style="max-width:90vw;max-height:75vh;object-fit:contain;border:1px solid rgba(201,169,110,0.15);"/>
    <p id="lb-caption" style="font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--muted);font-size:.95rem;text-align:center;"></p>
    <div style="display:flex;gap:.75rem;margin-top:.5rem;">
      <button onclick="lbNav(-1)" style="background:rgba(201,169,110,0.08);border:1px solid rgba(201,169,110,0.2);color:var(--gold);padding:.5rem 1.25rem;cursor:none;font-family:'Jost',sans-serif;font-size:.7rem;letter-spacing:.15em;" onmouseover="this.style.background='rgba(201,169,110,0.15)'" onmouseout="this.style.background='rgba(201,169,110,0.08)'">← Prev</button>
      <span id="lb-counter" style="font-size:.7rem;color:var(--muted);letter-spacing:.15em;align-self:center;"></span>
      <button onclick="lbNav(1)" style="background:rgba(201,169,110,0.08);border:1px solid rgba(201,169,110,0.2);color:var(--gold);padding:.5rem 1.25rem;cursor:none;font-family:'Jost',sans-serif;font-size:.7rem;letter-spacing:.15em;" onmouseover="this.style.background='rgba(201,169,110,0.15)'" onmouseout="this.style.background='rgba(201,169,110,0.08)'">Next →</button>
      <button onclick="deletePhoto(lbIdx)" style="background:rgba(181,99,106,0.08);border:1px solid rgba(181,99,106,0.3);color:var(--rose);padding:.5rem 1.25rem;cursor:none;font-family:'Jost',sans-serif;font-size:.7rem;letter-spacing:.15em;" onmouseover="this.style.background='rgba(181,99,106,0.15)'" onmouseout="this.style.background='rgba(181,99,106,0.08)'">Hapus</button>
    </div>
  </div>

  <div style="background:var(--surface);border:1px solid rgba(201,169,110,0.12);padding:1.5rem;">
    <p style="font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;">Upload Foto</p>
    <label id="upload-zone" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;padding:2rem;border:1px dashed rgba(201,169,110,0.2);cursor:none;transition:border-color .2s,background .2s;text-align:center;" onmouseover="this.style.borderColor='var(--gold)';this.style.background='rgba(201,169,110,0.03)'" onmouseout="this.style.borderColor='rgba(201,169,110,0.2)';this.style.background='transparent'">
      <div style="font-size:2rem;opacity:.25;">📁</div>
      <p style="font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--muted);font-size:.95rem;">Klik atau drag foto ke sini<br/><span style="font-size:.75rem;">Bisa upload banyak sekaligus</span></p>
      <input type="file" id="file-input" multiple accept="image/*" style="display:none;" onchange="handleFiles(this.files)"/>
    </label>
  </div>

  <a href="chapter-3.html" class="ch-next-page"><span>Lanjut ke Chapter 03 ✦</span></a>
</main>

<button class="music-btn" id="musicBtn"><div class="eq paused" id="eq"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div></button>

<script>
const cursor=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';});
(function a(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(a);})();
const sp=['✦','✧','★','✸','✺'];
document.addEventListener('click',e=>{const el=document.createElement('div');el.className='sparkle';el.textContent=sp[Math.floor(Math.random()*sp.length)];el.style.left=e.clientX+'px';el.style.top=e.clientY+'px';el.style.color=`hsl(${38+Math.random()*20},${60+Math.random()*30}%,${60+Math.random()*20}%)`;document.body.appendChild(el);setTimeout(()=>el.remove(),700);});
const cv=document.getElementById('starCanvas'),cx=cv.getContext('2d');let W,H,stars=[],ss=[];
function ic(){W=cv.width=innerWidth;H=cv.height=innerHeight;stars=Array.from({length:200},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.2,a:Math.random(),sp:Math.random()*.003+.001,ph:Math.random()*Math.PI*2}));}
function ds(t){cx.clearRect(0,0,W,H);for(const s of stars){const al=s.a*(.5+.5*Math.sin(t*s.sp*60+s.ph));cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(232,213,163,${al})`;cx.fill();}
for(let i=ss.length-1;i>=0;i--){const s=ss[i];s.x+=s.vx;s.y+=s.vy;s.life--;const al=s.life/s.ml,g=cx.createLinearGradient(s.x,s.y,s.x-s.vx*12,s.y-s.vy*12);g.addColorStop(0,`rgba(232,213,163,${al})`);g.addColorStop(1,'rgba(232,213,163,0)');cx.beginPath();cx.strokeStyle=g;cx.lineWidth=1.5;cx.moveTo(s.x,s.y);cx.lineTo(s.x-s.vx*12,s.y-s.vy*12);cx.stroke();if(s.life<=0)ss.splice(i,1);}
if(Math.random()<.004&&ss.length<3){const a=-Math.PI/6+(Math.random()-.5)*.4;ss.push({x:Math.random()*W,y:Math.random()*H*.5,vx:Math.cos(a)*8,vy:Math.sin(a)*8+4,life:60,ml:60});}
requestAnimationFrame(ds);}
ic();addEventListener('resize',ic);requestAnimationFrame(ds);
const pc=document.getElementById('petals');
function cp(){const p=document.createElement('div');p.className='petal';const sz=4+Math.random()*6;p.style.left=Math.random()*100+'vw';p.style.width=sz+'px';p.style.height=(sz*1.4)+'px';p.style.background=`rgba(${181+Math.random()*20},${99+Math.random()*20},${106+Math.random()*10},.4)`;const dur=8+Math.random()*8;p.style.animationDuration=dur+'s';p.style.animationDelay=Math.random()*5+'s';pc.appendChild(p);setTimeout(()=>p.remove(),(dur+5)*1000);}
setInterval(cp,600);for(let i=0;i<8;i++)cp();
const toastEl=document.getElementById('toast');let tt;
function showToast(m){toastEl.textContent=m;toastEl.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>toastEl.classList.remove('show'),3000);}
const mb=document.getElementById('musicBtn'),eq=document.getElementById('eq');
let ac,gn,pl=false,osc=[];
function startMusic(){ac=new(AudioContext||webkitAudioContext)();gn=ac.createGain();gn.gain.setValueAtTime(0,ac.currentTime);gn.gain.linearRampToValueAtTime(.05,ac.currentTime+2);gn.connect(ac.destination);
[261.63,329.63,392,523.25,659.25].forEach((f,i)=>{const o=ac.createOscillator(),og=ac.createGain();o.type='sine';o.frequency.value=f;og.gain.setValueAtTime(0,ac.currentTime);og.gain.linearRampToValueAtTime(1,ac.currentTime+i*.8+1.5);const lf=ac.createOscillator(),lg=ac.createGain();lf.frequency.value=.2+i*.05;lg.gain.value=.5;lf.connect(lg);lg.connect(o.frequency);lf.start();o.connect(og);og.connect(gn);o.start();osc.push({o,lf});});}
function stopMusic(){if(gn){gn.gain.linearRampToValueAtTime(0,ac.currentTime+1.5);setTimeout(()=>{osc.forEach(x=>{try{x.o.stop();x.lf.stop();}catch(e){}});ac.close();},1600);}}
mb.addEventListener('click',()=>{pl=!pl;if(pl){startMusic();eq.classList.remove('paused');showToast('♪ Musik menyala');}else{stopMusic();eq.classList.add('paused');showToast('♪ Musik dimatikan');}});
</script>

<script>
let photos=[], lbIdx=0;

function load(){
  try{photos=JSON.parse(localStorage.getItem('gallery_photos')||'[]');}catch(e){photos=[];}
  render();
}

function save(){
  try{localStorage.setItem('gallery_photos',JSON.stringify(photos));}
  catch(e){showToast('Penyimpanan penuh');}
}

function render(){
  const empty=document.getElementById('collage-empty');
  const header=document.getElementById('collage-header');
  const scroll=document.getElementById('collage-scroll');
  const grid=document.getElementById('collage-grid');
  if(!photos.length){
    empty.style.display='block';header.style.display='none';scroll.style.display='none';return;
  }
  empty.style.display='none';header.style.display='flex';scroll.style.display='block';
  document.getElementById('collage-count').textContent=photos.length+' foto';
  grid.innerHTML=photos.map((p,i)=>`
    <div style="break-inside:avoid;margin-bottom:8px;position:relative;overflow:hidden;cursor:none;" onclick="openLightbox(${i})">
      <img src="${p.src}" style="width:100%;display:block;transition:transform .35s ease;" onmouseover="this.style.transform='scale(1.04)'" onmouseout="this.style.transform='scale(1)'"/>
      <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(14,11,18,.75) 0%,transparent 55%);opacity:0;transition:opacity .3s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0'">
        <div style="position:absolute;bottom:0;left:0;right:0;padding:.6rem .75rem;display:flex;justify-content:space-between;align-items:flex-end;">
          <span style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.8rem;color:var(--cream);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.caption||''}</span>
          <button onclick="event.stopPropagation();deletePhoto(${i})" style="background:rgba(181,99,106,0.85);border:none;color:#fff;font-size:.58rem;letter-spacing:.1em;padding:.3rem .5rem;cursor:none;font-family:'Jost',sans-serif;flex-shrink:0;margin-left:.5rem;" onmouseover="this.style.background='var(--rose)'" onmouseout="this.style.background='rgba(181,99,106,0.85)'">✕ Hapus</button>
        </div>
      </div>
    </div>`).join('');
}

function deletePhoto(i){
  photos.splice(i,1);save();
  if(document.getElementById('lightbox').style.display!=='none'){
    if(!photos.length){closeLightbox();}
    else{lbIdx=Math.min(lbIdx,photos.length-1);updateLightbox();}
  }
  render();showToast('Foto dihapus ✦');
}

function clearAll(){
  if(!confirm('Hapus semua foto?'))return;
  photos=[];save();render();closeLightbox();showToast('Semua foto dihapus');
}

function openLightbox(i){
  lbIdx=i;
  document.getElementById('lightbox').style.display='flex';
  updateLightbox();
}

function updateLightbox(){
  const p=photos[lbIdx];
  document.getElementById('lb-img').src=p.src;
  document.getElementById('lb-caption').textContent=p.caption||'';
  document.getElementById('lb-counter').textContent=(lbIdx+1)+' / '+photos.length;
}

function lbNav(d){lbIdx=(lbIdx+d+photos.length)%photos.length;updateLightbox();}
function closeLightbox(){document.getElementById('lightbox').style.display='none';}

document.getElementById('lightbox').addEventListener('click',function(e){if(e.target===this)closeLightbox();});
document.addEventListener('keydown',e=>{
  if(document.getElementById('lightbox').style.display!=='none'){
    if(e.key==='ArrowLeft')lbNav(-1);
    if(e.key==='ArrowRight')lbNav(1);
    if(e.key==='Escape')closeLightbox();
  }
});

function handleFiles(files){
  const arr=Array.from(files);let done=0;
  arr.forEach(file=>{
    const r=new FileReader();
    r.onload=e=>{
      photos.push({src:e.target.result,caption:''});
      if(++done===arr.length){save();render();showToast(arr.length+' foto ditambahkan ✦');}
    };
    r.readAsDataURL(file);
  });
}

const uz=document.getElementById('upload-zone');
uz.addEventListener('click',()=>document.getElementById('file-input').click());
uz.addEventListener('dragover',e=>{e.preventDefault();uz.style.borderColor='var(--gold)';uz.style.background='rgba(201,169,110,0.05)';});
uz.addEventListener('dragleave',()=>{uz.style.borderColor='rgba(201,169,110,0.2)';uz.style.background='transparent';});
uz.addEventListener('drop',e=>{e.preventDefault();uz.style.borderColor='rgba(201,169,110,0.2)';uz.style.background='transparent';handleFiles(e.dataTransfer.files);});

load();
</script>
</body>
</html>
