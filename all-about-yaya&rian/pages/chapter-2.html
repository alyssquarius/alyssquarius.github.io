<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chapter 02 — Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#C9A96E;--gold-light:#E8D5A3;--rose:#B5636A;--deep:#0E0B12;--mid:#1A1425;--surface:#231B30;--cream:#F5EDD9;--text:#EDE4D3;--muted:#9B8FA0;}
html{scroll-behavior:smooth;}
body{background:var(--deep);color:var(--text);font-family:'Jost',sans-serif;font-weight:300;overflow-x:hidden;cursor:none;}
.cursor{position:fixed;width:8px;height:8px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
.cursor-ring{position:fixed;width:30px;height:30px;border:1px solid rgba(201,169,110,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .12s ease-out;}
#starCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.sparkle{position:fixed;pointer-events:none;z-index:9997;font-size:16px;animation:sparklePop .6s ease forwards;}
@keyframes sparklePop{0%{opacity:1;transform:scale(0) rotate(-20deg);}50%{opacity:1;transform:scale(1.2) rotate(10deg);}100%{opacity:0;transform:scale(.8) rotate(20deg) translateY(-30px);}}
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid rgba(201,169,110,0.25);color:var(--cream);padding:.75rem 1.5rem;font-size:.75rem;letter-spacing:.1em;opacity:0;transition:all .3s;pointer-events:none;z-index:200;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.petals-container{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.petal{position:absolute;top:-40px;border-radius:60% 40% 60% 40%;animation:petalFall linear infinite;opacity:0;}
@keyframes petalFall{0%{transform:translateY(0) rotate(0deg);opacity:0;}5%{opacity:1;}90%{opacity:.5;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
.music-btn{position:fixed;bottom:2rem;right:2rem;width:44px;height:44px;background:var(--surface);border:1px solid rgba(201,169,110,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:none;z-index:100;transition:all .2s;}
.music-btn:hover{background:rgba(201,169,110,0.15);border-color:var(--gold);}
.eq{display:flex;gap:2px;align-items:flex-end;height:16px;}
.eq-bar{width:3px;background:var(--gold);border-radius:1px;animation:eqAnim 1s ease-in-out infinite;}
.eq-bar:nth-child(1){animation-delay:0s;}.eq-bar:nth-child(2){animation-delay:.2s;}.eq-bar:nth-child(3){animation-delay:.4s;}
@keyframes eqAnim{0%,100%{height:4px;}50%{height:14px;}}
.eq.paused .eq-bar{animation-play-state:paused;height:8px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(32px);}to{opacity:1;transform:translateY(0);}}

/* ── PAGE LAYOUT ── */
.ch-page{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:5rem 2rem 6rem;}
.ch-back{display:inline-flex;align-items:center;gap:.5rem;font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);text-decoration:none;margin-bottom:4rem;transition:color .2s;cursor:none;}
.ch-back:hover{color:var(--gold);}
.ch-back::before{content:'←';}
.ch-label{font-size:.6rem;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:.75rem;}
.ch-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,7vw,4.5rem);font-weight:300;color:var(--cream);line-height:1;margin-bottom:1rem;}
.ch-intro{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;color:var(--muted);line-height:1.8;margin-bottom:3rem;padding-bottom:2rem;border-bottom:1px solid rgba(201,169,110,0.1);}

/* ── EXHIBIT SECTIONS ── */
.exhibit{margin-bottom:5rem;}
.exhibit-label{font-size:.58rem;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem;}
.exhibit-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;color:var(--cream);margin-bottom:2rem;}

/* ── PHOTO ITEM ── */
.photo-item{margin-bottom:3rem;opacity:0;animation:fadeUp .7s ease forwards;}
.photo-item:nth-child(1){animation-delay:.05s;}
.photo-item:nth-child(2){animation-delay:.15s;}
.photo-item:nth-child(3){animation-delay:.25s;}
.photo-item:nth-child(4){animation-delay:.35s;}
.photo-item:nth-child(5){animation-delay:.45s;}
.photo-item:nth-child(6){animation-delay:.55s;}
.photo-item:nth-child(7){animation-delay:.65s;}
.photo-item:nth-child(8){animation-delay:.75s;}
.photo-frame{position:relative;overflow:hidden;background:var(--mid);}
.photo-frame img{width:100%;display:block;transition:transform .6s ease;}
.photo-frame:hover img{transform:scale(1.03);}
.photo-delete{position:absolute;top:.75rem;right:.75rem;background:rgba(14,11,18,.75);border:1px solid rgba(181,99,106,0.5);color:var(--rose);font-size:.6rem;letter-spacing:.15em;padding:.35rem .65rem;cursor:none;font-family:'Jost',sans-serif;opacity:0;transition:opacity .2s,background .2s;text-transform:uppercase;}
.photo-frame:hover .photo-delete{opacity:1;}
.photo-delete:hover{background:rgba(181,99,106,0.2);}
.photo-meta{padding:1rem 0 0;}
.photo-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:300;color:var(--cream);margin-bottom:.35rem;}
.photo-caption{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.9rem;color:var(--muted);line-height:1.6;}
.photo-num{font-size:.58rem;letter-spacing:.3em;color:rgba(201,169,110,0.35);text-transform:uppercase;margin-bottom:.35rem;}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:5rem 2rem;border:1px dashed rgba(201,169,110,0.12);}
.empty-state-icon{font-size:2.5rem;opacity:.12;margin-bottom:1.25rem;}
.empty-state-text{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--muted);font-size:1rem;}

/* ── UPLOAD ── */
.upload-section{border-top:1px solid rgba(201,169,110,0.1);padding-top:2.5rem;margin-top:1rem;}
.upload-label-text{font-size:.6rem;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;}
.upload-zone{display:flex;flex-direction:column;align-items:center;gap:.75rem;padding:2.5rem;border:1px dashed rgba(201,169,110,0.18);cursor:none;transition:all .25s;text-align:center;}
.upload-zone:hover{border-color:var(--gold);background:rgba(201,169,110,0.025);}
.upload-zone-icon{font-size:1.75rem;opacity:.2;}
.upload-zone-text{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--muted);font-size:.95rem;line-height:1.6;}
.upload-actions{display:flex;gap:.75rem;margin-top:1.25rem;flex-wrap:wrap;}
.upload-caption-input{flex:1;min-width:0;background:var(--mid);border:1px solid rgba(201,169,110,0.15);color:var(--cream);font-size:.82rem;padding:.65rem 1rem;outline:none;font-family:'Jost',sans-serif;transition:border-color .2s;}
.upload-caption-input:focus{border-color:var(--gold);}
.upload-caption-input::placeholder{color:var(--muted);}
.upload-caption-title-input{flex:1;min-width:0;background:var(--mid);border:1px solid rgba(201,169,110,0.15);color:var(--cream);font-size:.82rem;padding:.65rem 1rem;outline:none;font-family:'Jost',sans-serif;transition:border-color .2s;}
.upload-caption-title-input:focus{border-color:var(--gold);}
.upload-caption-title-input::placeholder{color:var(--muted);}
.btn-gold{background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:'Jost',sans-serif;font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;padding:.65rem 1.5rem;cursor:none;position:relative;overflow:hidden;transition:color .3s;white-space:nowrap;}
.btn-gold::before{content:"";position:absolute;inset:0;background:var(--gold);transform:translateX(-101%);transition:transform .4s cubic-bezier(.77,0,.18,1);z-index:0;}
.btn-gold:hover::before{transform:translateX(0);}
.btn-gold:hover{color:var(--deep);}
.btn-gold span{position:relative;z-index:1;}
.btn-rose{background:transparent;border:1px solid rgba(181,99,106,0.35);color:var(--rose);font-family:'Jost',sans-serif;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;padding:.5rem 1rem;cursor:none;transition:all .2s;white-space:nowrap;}
.btn-rose:hover{background:rgba(181,99,106,0.08);}

/* ── NEXT ── */
.ch-next-page{display:block;margin:4rem auto 0;padding:1rem 3rem;background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:'Jost',sans-serif;font-size:.75rem;letter-spacing:.3em;text-transform:uppercase;cursor:none;position:relative;overflow:hidden;transition:color .3s;text-decoration:none;text-align:center;width:fit-content;}
.ch-next-page::before{content:"";position:absolute;inset:0;background:var(--gold);transform:translateX(-101%);transition:transform .4s cubic-bezier(.77,0,.18,1);z-index:0;}
.ch-next-page:hover::before{transform:translateX(0);}
.ch-next-page:hover{color:var(--deep);}
.ch-next-page span{position:relative;z-index:1;}

/* ── LIGHTBOX ── */
.lightbox{display:none;position:fixed;inset:0;background:rgba(10,8,16,.96);z-index:400;align-items:center;justify-content:center;flex-direction:column;gap:1.25rem;padding:2rem;}
.lightbox-img{max-width:88vw;max-height:78vh;object-fit:contain;}
.lightbox-caption{font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--muted);font-size:.95rem;text-align:center;max-width:500px;}
.lightbox-nav{display:flex;gap:.75rem;align-items:center;}
.lightbox-close{position:absolute;top:1.5rem;right:1.5rem;background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:none;transition:color .2s;}
.lightbox-close:hover{color:var(--cream);}
.lb-btn{background:rgba(201,169,110,0.07);border:1px solid rgba(201,169,110,0.2);color:var(--gold);padding:.5rem 1.25rem;cursor:none;font-family:'Jost',sans-serif;font-size:.68rem;letter-spacing:.15em;transition:background .2s;}
.lb-btn:hover{background:rgba(201,169,110,0.15);}
.lb-counter{font-size:.68rem;color:var(--muted);letter-spacing:.15em;min-width:60px;text-align:center;}
.lb-del{background:rgba(181,99,106,0.07);border:1px solid rgba(181,99,106,0.3);color:var(--rose);padding:.5rem 1.25rem;cursor:none;font-family:'Jost',sans-serif;font-size:.68rem;letter-spacing:.15em;transition:background .2s;}
.lb-del:hover{background:rgba(181,99,106,0.15);}
</style>

<script>
const cursor=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';});
(function a(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(a);})();
const sp=['✦','✧','★','✸','✺'];
document.addEventListener('click',e=>{const el=document.createElement('div');el.className='sparkle';el.textContent=sp[Math.floor(Math.random()*sp.length)];el.style.left=e.clientX+'px';el.style.top=e.clientY+'px';el.style.color=`hsl(${38+Math.random()*20},${60+Math.random()*30}%,${60+Math.random()*20}%)`;document.body.appendChild(el);setTimeout(()=>el.remove(),700);});
const cv=document.getElementById('starCanvas'),cx=cv.getContext('2d');let W,H,stars=[],ss=[];
function ic(){W=cv.width=innerWidth;H=cv.height=innerHeight;stars=Array.from({length:200},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.2,a:Math.random(),sp:Math.random()*.003+.001,ph:Math.random()*Math.PI*2}));}
function ds(t){cx.clearRect(0,0,W,H);for(const s of stars){const al=s.a*(.5+.5*Math.sin(t*s.sp*60+s.ph));cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(232,213,163,${al})`;cx.fill();}
for(let i=ss.length-1;i>=0;i--){const s=ss[i];s.x+=s.vx;s.y+=s.vy;s.life--;const al=s.life/s.ml,g=cx.createLinearGradient(s.x,s.y,s.x-s.vx*12,s.y-s.vy*12);g.addColorStop(0,`rgba(232,213,163,${al})`);g.addColorStop(1,'rgba(232,213,163,0)');cx.beginPath();cx.strokeStyle=g;cx.lineWidth=1.5;cx.moveTo(s.x,s.y);cx.lineTo(s.x-s.vx*12,s.y-s.vy*12);cx.stroke();if(s.life<=0)ss.splice(i,1);}
if(Math.random()<.004&&ss.length<3){const a=-Math.PI/6+(Math.random()-.5)*.4;ss.push({x:Math.random()*W,y:Math.random()*H*.5,vx:Math.cos(a)*8,vy:Math.sin(a)*8+4,life:60,ml:60});}
requestAnimationFrame(ds);}
ic();addEventListener('resize',ic);requestAnimationFrame(ds);
const pc=document.getElementById('petals');
function cp(){const p=document.createElement('div');p.className='petal';const sz=4+Math.random()*6;p.style.left=Math.random()*100+'vw';p.style.width=sz+'px';p.style.height=(sz*1.4)+'px';p.style.background=`rgba(${181+Math.random()*20},${99+Math.random()*20},${106+Math.random()*10},.4)`;const dur=8+Math.random()*8;p.style.animationDuration=dur+'s';p.style.animationDelay=Math.random()*5+'s';pc.appendChild(p);setTimeout(()=>p.remove(),(dur+5)*1000);}
setInterval(cp,600);for(let i=0;i<8;i++)cp();
const toastEl=document.getElementById('toast');let tt;
function showToast(m){toastEl.textContent=m;toastEl.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>toastEl.classList.remove('show'),3000);}
const mb=document.getElementById('musicBtn'),eq=document.getElementById('eq');
let ac,gn,pl=false,osc=[];
function startMusic(){ac=new(AudioContext||webkitAudioContext)();gn=ac.createGain();gn.gain.setValueAtTime(0,ac.currentTime);gn.gain.linearRampToValueAtTime(.05,ac.currentTime+2);gn.connect(ac.destination);
[261.63,329.63,392,523.25,659.25].forEach((f,i)=>{const o=ac.createOscillator(),og=ac.createGain();o.type='sine';o.frequency.value=f;og.gain.setValueAtTime(0,ac.currentTime);og.gain.linearRampToValueAtTime(1,ac.currentTime+i*.8+1.5);const lf=ac.createOscillator(),lg=ac.createGain();lf.frequency.value=.2+i*.05;lg.gain.value=.5;lf.connect(lg);lg.connect(o.frequency);lf.start();o.connect(og);og.connect(gn);o.start();osc.push({o,lf});});}
function stopMusic(){if(gn){gn.gain.linearRampToValueAtTime(0,ac.currentTime+1.5);setTimeout(()=>{osc.forEach(x=>{try{x.o.stop();x.lf.stop();}catch(e){}});ac.close();},1600);}}
mb.addEventListener('click',()=>{pl=!pl;if(pl){startMusic();eq.classList.remove('paused');showToast('♪ Musik menyala');}else{stopMusic();eq.classList.add('paused');showToast('♪ Musik dimatikan');}});
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://urznpphqbdmwgnbhrzdi.supabase.co';  // ← ganti
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyem5wcGhxYmRtd2duYmhyemRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NjczNTYsImV4cCI6MjA5MjU0MzM1Nn0.0kymrIh-8qrl68bDtZqjkI7Ke5mQLrH280zWfzF6UQ8';    // ← ganti anon key

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let photos = [], lbIdx = 0;

// ── LOAD dari Supabase ──
async function load() {
  showToast('Memuat foto...');
  const { data, error } = await sb
    .from('gallery_photos')
    .select('*')
    .order('created_at', { ascending: true });
  if (error) { showToast('Gagal memuat foto'); return; }
  photos = data;
  render();
}

// ── RENDER ──
function render() {
  const list = document.getElementById('photos-list');
  const empty = document.getElementById('empty-state');
  if (!photos.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  list.innerHTML = photos.map((p, i) => `
    <div class="photo-item">
      <div class="photo-frame" onclick="openLb(${i})">
        <img src="${p.src}" alt="${p.title || ''}"/>
        <button class="photo-delete" onclick="event.stopPropagation();deletePhoto('${p.id}',${i})">✕ Hapus</button>
      </div>
      <div class="photo-meta">
        <div class="photo-num">No. ${String(i+1).padStart(2,'0')}</div>
        ${p.title ? `<div class="photo-title">${p.title}</div>` : ''}
        ${p.caption ? `<div class="photo-caption">${p.caption}</div>` : ''}
      </div>
    </div>`).join('');
}

// ── UPLOAD ke Supabase Storage ──
async function handleFiles(files) {
  const arr = Array.from(files);
  const title = document.getElementById('inp-title').value.trim();
  const caption = document.getElementById('inp-caption').value.trim();

  showToast('Mengupload ' + arr.length + ' foto...');

  for (const file of arr) {
    const ext = file.name.split('.').pop();
    const fileName = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;

    // upload ke storage
    const { error: upErr } = await sb.storage
      .from('photos')
      .upload(fileName, file);
      // .upload(fileName, file, { contentType: file.type });

    if (upErr) { showToast('Gagal upload: ' + file.name); continue; }

    // ambil public URL
    const { data: urlData } = sb.storage.from('photos').getPublicUrl(fileName);
    const src = urlData.publicUrl;

    // simpan ke tabel
    const { data: row, error: dbErr } = await sb
      .from('gallery_photos')
      .insert({ src, title, caption })
      .select()
      .single();

    if (dbErr) { showToast('Gagal simpan: ' + file.name); continue; }
    photos.push(row);
  }

  render();
  document.getElementById('inp-title').value = '';
  document.getElementById('inp-caption').value = '';
  showToast(arr.length + ' foto berhasil diupload ✦');
}

// ── DELETE ──
async function deletePhoto(id, i) {
  // hapus dari storage
  const src = photos[i].src;
  const fileName = src.split('/photos/')[1];
  await sb.storage.from('photos').remove([fileName]);

  // hapus dari tabel
  await sb.from('gallery_photos').delete().eq('id', id);

  photos.splice(i, 1);
  const lb = document.getElementById('lightbox');
  if (lb.style.display !== 'none') {
    if (!photos.length) closeLb();
    else { lbIdx = Math.min(lbIdx, photos.length - 1); updateLb(); }
  }
  render();
  showToast('Foto dihapus ✦');
}

async function clearAll() {
  if (!photos.length) return;
  if (!confirm('Hapus semua foto?')) return;
  const fileNames = photos.map(p => p.src.split('/photos/')[1]);
  await sb.storage.from('photos').remove(fileNames);
  await sb.from('gallery_photos').delete().neq('id', '00000000-0000-0000-0000-000000000000');
  photos = []; render(); closeLb();
  showToast('Semua foto dihapus');
}

// ── REALTIME (foto muncul otomatis kalau orang lain upload) ──
sb.channel('gallery')
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'gallery_photos' }, payload => {
    if (!photos.find(p => p.id === payload.new.id)) {
      photos.push(payload.new);
      render();
      showToast('Foto baru ditambahkan ✦');
    }
  })
  .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'gallery_photos' }, payload => {
    photos = photos.filter(p => p.id !== payload.old.id);
    render();
  })
  .subscribe();

// ── LIGHTBOX ──
function openLb(i) { lbIdx = i; document.getElementById('lightbox').style.display = 'flex'; updateLb(); }
function updateLb() {
  const p = photos[lbIdx];
  document.getElementById('lb-img').src = p.src;
  document.getElementById('lb-cap').textContent = [p.title, p.caption].filter(Boolean).join(' — ');
  document.getElementById('lb-counter').textContent = (lbIdx+1) + ' / ' + photos.length;
}
function lbNav(d) { lbIdx = (lbIdx + d + photos.length) % photos.length; updateLb(); }
function closeLb() { document.getElementById('lightbox').style.display = 'none'; }
document.getElementById('lightbox').addEventListener('click', function(e) { if (e.target === this) closeLb(); });
document.addEventListener('keydown', e => {
  if (document.getElementById('lightbox').style.display !== 'none') {
    if (e.key === 'ArrowLeft') lbNav(-1);
    if (e.key === 'ArrowRight') lbNav(1);
    if (e.key === 'Escape') closeLb();
  }
});

// ── UPLOAD ZONE ──
const uz = document.getElementById('upload-zone');
uz.addEventListener('click', () => document.getElementById('file-input').click());
uz.addEventListener('dragover', e => { e.preventDefault(); uz.style.borderColor = 'var(--gold)'; });
uz.addEventListener('dragleave', () => { uz.style.borderColor = 'rgba(201,169,110,0.18)'; });
uz.addEventListener('drop', e => {
  e.preventDefault();
  uz.style.borderColor = 'rgba(201,169,110,0.18)';
  handleFiles(e.dataTransfer.files);
});

load();
</script>
</body>
