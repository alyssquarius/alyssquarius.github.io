<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Chapter 02 — Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --gold: #C9A96E; --gold-light: #E8D5A3; --rose: #B5636A; --deep: #0E0B12;
            --mid: #1A1425; --surface: #231B30; --cream: #F5EDD9; --text: #EDE4D3; --muted: #9B8FA0;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { background: var(--deep); color: var(--text); font-family: 'Jost', sans-serif; font-weight: 300; overflow-x: hidden; cursor: none; }

        /* ── CURSOR & EFFECTS ── */
        .cursor { position: fixed; width: 8px; height: 8px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); }
        .cursor-ring { position: fixed; width: 30px; height: 30px; border: 1px solid rgba(201, 169, 110, 0.4); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); transition: all .12s ease-out; }
        #starCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        
        /* ── ENTER PROMPT (Crucial for Music) ── */
        #playPrompt { position: fixed; inset: 0; background: var(--deep); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 2rem; transition: opacity .8s ease; }

        /* ── POLAROID GRID ── */
        #photos-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 2.5rem; justify-items: center; margin-top: 2rem; }
        .photo-item { opacity: 0; animation: fadeUp .7s ease forwards; display: flex; justify-content: center; width: 100%; }
        
        .polaroid { 
            background: #F5EDD9; padding: 12px 12px 48px 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,.3); cursor: none;
            transition: transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s;
            position: relative; width: 100%; max-width: 260px;
        }
        .polaroid:hover { transform: rotate(0deg) scale(1.05) translateY(-10px) !important; z-index: 10; box-shadow: 0 20px 40px rgba(0,0,0,.5); }
        
        .photo-item:nth-child(odd) .polaroid { transform: rotate(-1.5deg); }
        .photo-item:nth-child(even) .polaroid { transform: rotate(2deg); }

        .polaroid-frame { position: relative; overflow: hidden; background: #000; aspect-ratio: 1/1; }
        .polaroid-frame img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s ease; filter: sepia(15%); }
        .polaroid-caption { padding: 12px 4px; text-align: center; }
        .photo-title { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: #2A1F0E; margin-bottom: 4px; }
        .photo-caption-text { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: .85rem; color: rgba(0,0,0,.5); }

        /* ── BUTTONS & UI ── */
        .btn-gold { 
            background: transparent; border: 1px solid var(--gold); color: var(--gold); 
            padding: .8rem 2rem; letter-spacing: .2em; text-transform: uppercase; cursor: none; 
            position: relative; overflow: hidden; transition: 0.3s;
        }
        .btn-gold:hover { background: var(--gold); color: var(--deep); }
        .music-btn { position: fixed; bottom: 2rem; right: 2rem; width: 48px; height: 48px; background: var(--surface); border: 1px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; cursor: none; }
        
        .eq { display: flex; gap: 3px; align-items: flex-end; height: 16px; }
        .eq-bar { width: 3px; background: var(--gold); animation: eqAnim 1s ease-in-out infinite; }
        .eq.paused .eq-bar { animation-play-state: paused; height: 5px; }
        @keyframes eqAnim { 0%, 100% { height: 4px; } 50% { height: 16px; } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .ch-page { max-width: 900px; margin: 0 auto; padding: 5rem 2rem; }
        .ch-title { font-family: 'Cormorant Garamond', serif; font-size: 4rem; color: var(--cream); line-height: 1; }
        .upload-section { margin-top: 5rem; padding: 2rem; border: 1px dashed rgba(201,169,110,0.2); text-align: center; }
        .toast { position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%); background: var(--surface); padding: .8rem 1.5rem; border-radius: 4px; opacity: 0; transition: 0.3s; z-index: 10000; pointer-events: none; border: 1px solid var(--gold); }
        .toast.show { opacity: 1; }
        
        .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10001; align-items: center; justify-content: center; flex-direction: column; padding: 2rem; }
        .lightbox img { max-height: 70vh; max-width: 90%; margin-bottom: 1rem; }
        
        @media(max-width: 600px) { .ch-title { font-size: 2.5rem; } #photos-list { grid-template-columns: 1fr 1fr; gap: 1rem; } }
    </style>
</head>
<body>

    <div id="playPrompt">
        <div style="font-size: .7rem; letter-spacing: .5em; color: var(--gold); text-transform: uppercase; margin-bottom: 1rem;">Chapter 02</div>
        <h2 style="font-family:'Cormorant Garamond',serif; color:var(--cream); font-size: 2rem; font-weight: 300;">Galeri Kita</h2>
        <button class="btn-gold" id="enterBtn">Masuk & Putar Musik</button>
    </div>

    <div id="yt-player-container" style="position:fixed; left:-999px; top:-999px;">
        <div id="yt-player"></div>
    </div>

    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursorRing"></div>
    <canvas id="starCanvas"></canvas>
    <div class="toast" id="toast"></div>

    <main class="ch-page">
        <div style="color: var(--gold); font-size: .6rem; letter-spacing: .4em; text-transform: uppercase; margin-bottom: 1rem;">Memories</div>
        <h1 class="ch-title">Galeri <em style="color: var(--gold-light); font-style: italic;">Gemas</em></h1>
        <p style="margin-top: 1rem; color: var(--muted); font-style: italic;">Tempat rahasia kita menyimpan semua memori hihi.</p>

        <div id="photos-list"></div>

        <div class="upload-section">
            <h3 style="color: var(--gold); margin-bottom: 1.5rem;">Tambah Memori Baru</h3>
            <input type="text" id="inp-title" placeholder="Judul (opsional)" style="background:var(--mid); border:1px solid #333; color:white; padding:8px; margin-bottom:10px; width:80%;">
            <input type="file" id="file-input" multiple accept="image/*" style="display:none;" onchange="handleFiles(this.files)">
            <button class="btn-gold" onclick="document.getElementById('file-input').click()">Pilih Foto</button>
        </div>
    </main>

    <div class="lightbox" id="lightbox" onclick="closeLb()">
        <img id="lb-img" src="">
        <p id="lb-cap" style="color: var(--muted); font-style: italic;"></p>
        <button class="btn-gold" style="margin-top: 2rem; font-size: .6rem;" onclick="deletePhotoInLb()">Hapus Foto Ini</button>
    </div>

    <button class="music-btn" id="musicBtn">
        <div class="eq paused" id="eq">
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
            <div class="eq-bar"></div>
        </div>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // --- CONFIG & SUPABASE ---
        const SUPABASE_URL = 'https://urznpphqbdmwgnbhrzdi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyem5wcGhxYmRtd2duYmhyemRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NjczNTYsImV4cCI6MjA5MjU0MzM1Nn0.0kymrIh-8qrl68bDtZqjkI7Ke5mQLrH280zWfzF6UQ8';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let photos = [], ytPlayer = null, ytReady = false, isPlaying = false, lbIdx = 0;

        // --- YOUTUBE API ---
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('yt-player', {
                height: '1', width: '1', videoId: 'zWxuc8L0W_Y',
                playerVars: { autoplay: 0, controls: 0, loop: 1, playlist: 'zWxuc8L0W_Y' },
                events: { 
                    onReady: () => { ytReady = true; ytPlayer.setVolume(60); },
                    onStateChange: (e) => { if(e.data === YT.PlayerState.ENDED) ytPlayer.playVideo(); }
                }
            });
        };

        // --- CORE LOGIC ---
        document.getElementById('enterBtn').addEventListener('click', () => {
            document.getElementById('playPrompt').style.opacity = '0';
            setTimeout(() => document.getElementById('playPrompt').style.display = 'none', 800);
            
            const startMusic = () => {
                if(ytReady) { 
                    ytPlayer.playVideo(); 
                    document.getElementById('eq').classList.remove('paused');
                    isPlaying = true;
                    showToast("♪ IT'S YOU — MAX");
                } else { setTimeout(startMusic, 300); }
            };
            startMusic();
        });

        document.getElementById('musicBtn').addEventListener('click', () => {
            if(!ytReady) return;
            if(isPlaying) { ytPlayer.pauseVideo(); document.getElementById('eq').classList.add('paused'); }
            else { ytPlayer.playVideo(); document.getElementById('eq').classList.remove('paused'); }
            isPlaying = !isPlaying;
        });

        // --- GALLERY FUNCTIONS ---
        async function loadPhotos() {
            const { data } = await sb.from('gallery_photos').select('*').order('created_at', {ascending: true});
            photos = data || [];
            renderGallery();
        }

        function renderGallery() {
            const list = document.getElementById('photos-list');
            list.innerHTML = photos.map((p, i) => `
                <div class="photo-item" onclick="openLb(${i})">
                    <div class="polaroid">
                        <div class="polaroid-frame"><img src="${p.src}"></div>
                        <div class="polaroid-caption">
                            <div class="photo-title">${p.title || 'Momen Indah'}</div>
                            <div class="photo-caption-text">#${i+1}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function handleFiles(files) {
            showToast("Sabar ya, lagi upload...");
            for(let file of files) {
                const name = `${Date.now()}-${file.name}`;
                const { data: upData } = await sb.storage.from('photos').upload(name, file);
                if(upData) {
                    const { data: urlData } = sb.storage.from('photos').getPublicUrl(name);
                    await sb.from('gallery_photos').insert({ src: urlData.publicUrl, title: document.getElementById('inp-title').value });
                }
            }
            loadPhotos();
            showToast("Berhasil diupload! ✨");
        }

        // --- LIGHTBOX ---
        function openLb(i) {
            lbIdx = i;
            document.getElementById('lightbox').style.display = 'flex';
            document.getElementById('lb-img').src = photos[i].src;
            document.getElementById('lb-cap').innerText = photos[i].title || '';
        }
        function closeLb() { document.getElementById('lightbox').style.display = 'none'; }

        async function deletePhotoInLb() {
            if(!confirm("Hapus foto ini?")) return;
            const target = photos[lbIdx];
            await sb.from('gallery_photos').delete().eq('id', target.id);
            closeLb();
            loadPhotos();
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // --- VISUAL EFFECTS (Cursor & Stars) ---
        const cursor = document.getElementById('cursor'), ring = document.getElementById('cursorRing');
        let mx=0, my=0, rx=0, ry=0;
        document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; cursor.style.left=mx+'px'; cursor.style.top=my+'px'; });
        const animate = () => {
            rx += (mx - rx) * 0.15; ry += (my - ry) * 0.15;
            ring.style.left = rx+'px'; ring.style.top = ry+'px';
            requestAnimationFrame(animate);
        };
        animate();

        // Star Canvas
        const cv = document.getElementById('starCanvas'), cx = cv.getContext('2d');
        let stars = [];
        function initStars() {
            cv.width = window.innerWidth; cv.height = window.innerHeight;
            stars = Array.from({length: 150}, () => ({ x: Math.random()*cv.width, y: Math.random()*cv.height, r: Math.random()*1.5 }));
        }
        function drawStars() {
            cx.clearRect(0,0,cv.width,cv.height);
            cx.fillStyle = "white";
            stars.forEach(s => {
                cx.globalAlpha = Math.random();
                cx.beginPath(); cx.arc(s.x, s.y, s.r, 0, Math.PI*2); cx.fill();
            });
            requestAnimationFrame(drawStars);
        }
        window.addEventListener('resize', initStars);
        initStars(); drawStars();
        loadPhotos();
    </script>
</body>
</html>
