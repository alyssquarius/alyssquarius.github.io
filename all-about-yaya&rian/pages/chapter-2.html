<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chapter 02 — Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>

<style>
/* ===== GLOBAL ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#C9A96E;--gold-light:#E8D5A3;--rose:#B5636A;--deep:#0E0B12;--mid:#1A1425;--surface:#231B30;--cream:#F5EDD9;--text:#EDE4D3;--muted:#9B8FA0;}
body{background:var(--deep);color:var(--text);font-family:'Jost',sans-serif;cursor:none;}

/* ===== GRID ===== */
#photos-list{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:2rem;
  justify-items:center;
}

/* ===== POLAROID STYLE ===== */
.photo-item{opacity:0;animation:fadeUp .7s ease forwards;display:flex;justify-content:center;}

.polaroid{
  background:#F5EDD9;
  padding:12px 12px 48px;
  box-shadow:0 4px 6px rgba(0,0,0,.4);
  transition:.3s;
  position:relative;
  width:100%;
  max-width:260px;
}

.photo-item:nth-child(odd) .polaroid{transform:rotate(-1.5deg);}
.photo-item:nth-child(even) .polaroid{transform:rotate(1.8deg);}

.polaroid:hover{
  transform:scale(1.05) rotate(0)!important;
  z-index:10;
}

.polaroid-frame{
  aspect-ratio:1/1;
  overflow:hidden;
}

.polaroid-frame img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== CAPTION ===== */
.polaroid-caption{text-align:center;margin-top:8px;}
.photo-title{font-family:'Cormorant Garamond';color:#2A1F0E;}
.photo-caption-text{font-style:italic;color:#555;}

/* ===== UPLOAD UI (ADVANCED) ===== */
.upload-section{margin-top:3rem;}
.upload-trigger-row{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:.75rem;
}
.upload-trigger-btn{
  padding:1rem;
  background:var(--mid);
  border:1px dashed var(--gold);
  text-align:center;
  cursor:pointer;
}
.drop-zone{
  border:1px dashed var(--gold);
  margin-top:1rem;
  padding:1rem;
  text-align:center;
  cursor:pointer;
}

/* ===== PREVIEW MODAL ===== */
.preview-modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  z-index:500;
}
.preview-modal.show{display:flex;}

.preview-inner{
  margin:auto;
  background:var(--mid);
  padding:1rem;
  width:90%;
  max-width:500px;
}

.preview-item{display:flex;gap:1rem;margin-bottom:1rem;}
.preview-thumb{width:80px;height:80px;object-fit:cover;}

/* ===== LIGHTBOX ===== */
.lightbox{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.95);
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
.lightbox img{max-width:90%;}

/* ===== ANIM ===== */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<main class="ch-page">

<h1>Galeri Kita ✦</h1>

<div id="photos-list"></div>

<!-- UPLOAD -->
<div class="upload-section">

<div class="upload-trigger-row">
<label class="upload-trigger-btn" for="file-gallery">Galeri</label>
<label class="upload-trigger-btn" for="file-camera">Kamera</label>
<label class="upload-trigger-btn" for="file-multi">Banyak</label>
</div>

<input type="file" id="file-gallery" multiple onchange="collectFiles(this.files)" hidden>
<input type="file" id="file-camera" capture="environment" onchange="collectFiles(this.files)" hidden>
<input type="file" id="file-multi" multiple onchange="collectFiles(this.files)" hidden>

<div class="drop-zone" id="drop-zone">Drag & drop foto</div>

</div>

</main>

<!-- PREVIEW -->
<div class="preview-modal" id="previewModal">
  <div class="preview-inner">
    <div id="previewList"></div>
    <button onclick="uploadAll()">Upload</button>
    <button onclick="closePreview()">Batal</button>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
<img id="lb-img">
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const sb = supabase.createClient(
'https://urznpphqbdmwgnbhrzdi.supabase.co',
'your_key_here'
);

let photos=[],pendingFiles=[],lbIdx=0;

/* ===== LOAD ===== */
async function load(){
 const {data}=await sb.from('gallery_photos').select('*');
 photos=data||[];
 render();
}

/* ===== RENDER ===== */
function render(){
 const list=document.getElementById('photos-list');

 list.innerHTML=photos.map((p,i)=>`
 <div class="photo-item">
  <div class="polaroid" onclick="openLb(${i})">
    <div class="polaroid-frame">
      <img src="${p.src}">
    </div>
    <div class="polaroid-caption">
      <div class="photo-title">${p.title||''}</div>
      <div class="photo-caption-text">${p.caption||''}</div>
    </div>
  </div>
 </div>
 `).join('');
}

/* ===== PREVIEW ===== */
function collectFiles(files){
 pendingFiles=[...pendingFiles,...Array.from(files)];
 openPreview();
}

function openPreview(){
 document.getElementById('previewModal').classList.add('show');
 const list=document.getElementById('previewList');
 list.innerHTML=pendingFiles.map((f,i)=>`
 <div class="preview-item">
  <img class="preview-thumb" src="${URL.createObjectURL(f)}">
 </div>`).join('');
}

function closePreview(){
 document.getElementById('previewModal').classList.remove('show');
 pendingFiles=[];
}

/* ===== UPLOAD ===== */
async function uploadAll(){
 for(const file of pendingFiles){
  const fn=Date.now()+file.name;
  await sb.storage.from('photos').upload(fn,file);
  const {data}=sb.storage.from('photos').getPublicUrl(fn);

  await sb.from('gallery_photos').insert({
    src:data.publicUrl
  });
 }
 pendingFiles=[];
 closePreview();
 load();
}

/* ===== LIGHTBOX ===== */
function openLb(i){
 document.getElementById('lightbox').style.display='flex';
 document.getElementById('lb-img').src=photos[i].src;
}

/* ===== DROP ===== */
const dz=document.getElementById('drop-zone');
dz.addEventListener('drop',e=>{
 e.preventDefault();
 collectFiles(e.dataTransfer.files);
});
dz.addEventListener('dragover',e=>e.preventDefault());

load();
</script>

</body>
</html>
