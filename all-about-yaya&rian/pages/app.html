<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>All About — Yaya & Rian</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0E0B12;overflow:hidden;}
#site-frame{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  border:none;
}
#yt-wrap{
  position:fixed;
  bottom:-9999px;
  left:-9999px;
  width:1px;
  height:1px;
  pointer-events:none;
  z-index:-1;
}
</style>
</head>
<body>

<!-- Website berjalan di dalam iframe ini -->
<iframe id="site-frame" src="index.html" allowfullscreen></iframe>

<!-- YouTube player tersembunyi — musik tidak pernah berhenti -->
<div id="yt-wrap">
  <div id="yt-player"></div>
</div>

<script>
const YT_VIDEO_ID = 'E07s5ZYygMg'; // Keshi — It's You
let player = null;
let isPlaying = true;

// Load YouTube API
const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);

window.onYouTubeIframeAPIReady = function() {
  player = new YT.Player('yt-player', {
    videoId: YT_VIDEO_ID,
    playerVars: {
      autoplay: 1,
      loop: 1,
      playlist: YT_VIDEO_ID,
      controls: 0,
      disablekb: 1,
      fs: 0,
      modestbranding: 1,
    },
    events: {
      onReady: function(e) {
        e.target.setVolume(40);
        e.target.playVideo();
        // Broadcast ke iframe bahwa musik sudah jalan
        broadcastStatus(true);
      },
      onStateChange: function(e) {
        if (e.data === YT.PlayerState.PLAYING) {
          isPlaying = true;
          broadcastStatus(true);
        } else if (e.data === YT.PlayerState.PAUSED) {
          isPlaying = false;
          broadcastStatus(false);
        }
      }
    }
  });
};

// Kirim status musik ke halaman dalam iframe
function broadcastStatus(playing) {
  const frame = document.getElementById('site-frame');
  if (frame && frame.contentWindow) {
    try {
      frame.contentWindow.postMessage({ type: 'MUSIC_STATUS', playing }, '*');
    } catch(e) {}
  }
}

// Terima perintah dari halaman dalam iframe (toggle, navigate)
window.addEventListener('message', function(e) {
  if (!e.data || !e.data.type) return;

  if (e.data.type === 'MUSIC_TOGGLE') {
    if (!player) return;
    const state = player.getPlayerState();
    if (state === 1) {
      player.pauseVideo();
    } else {
      player.playVideo();
    }
  }

  if (e.data.type === 'NAVIGATE') {
    const frame = document.getElementById('site-frame');
    if (frame) frame.src = e.data.url;
  }

  if (e.data.type === 'GET_STATUS') {
    broadcastStatus(isPlaying);
  }
});
</script>
</body>
</html>
