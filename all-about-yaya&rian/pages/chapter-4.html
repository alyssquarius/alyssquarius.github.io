<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chapter 04 — Coupon Deck</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#C9A96E;--gold-light:#E8D5A3;--rose:#B5636A;--rose-dark:#7A3B40;--deep:#0E0B12;--mid:#1A1425;--surface:#231B30;--cream:#F5EDD9;--text:#EDE4D3;--muted:#9B8FA0;}
html{scroll-behavior:smooth;}
body{background:var(--deep);color:var(--text);font-family:'Jost',sans-serif;font-weight:300;overflow-x:hidden;cursor:none;}
.cursor{position:fixed;width:8px;height:8px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
.cursor-ring{position:fixed;width:30px;height:30px;border:1px solid rgba(201,169,110,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .12s ease-out;}
#starCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.sparkle{position:fixed;pointer-events:none;z-index:9997;font-size:16px;animation:sparklePop .6s ease forwards;}
@keyframes sparklePop{0%{opacity:1;transform:scale(0) rotate(-20deg);}50%{opacity:1;transform:scale(1.2) rotate(10deg);}100%{opacity:0;transform:scale(.8) rotate(20deg) translateY(-30px);}}
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid rgba(201,169,110,0.25);color:var(--cream);padding:.75rem 1.5rem;font-size:.75rem;letter-spacing:.1em;opacity:0;transition:all .3s;pointer-events:none;z-index:200;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.petals-container{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.petal{position:absolute;top:-40px;border-radius:60% 40% 60% 40%;animation:petalFall linear infinite;opacity:0;}
@keyframes petalFall{0%{transform:translateY(0) rotate(0deg);opacity:0;}5%{opacity:1;}90%{opacity:.5;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
.music-btn{position:fixed;bottom:2rem;right:2rem;width:44px;height:44px;background:var(--surface);border:1px solid rgba(201,169,110,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:none;z-index:100;transition:all .2s;}
.music-btn:hover{background:rgba(201,169,110,0.15);border-color:var(--gold);}
.eq{display:flex;gap:2px;align-items:flex-end;height:16px;}
.eq-bar{width:3px;background:var(--gold);border-radius:1px;animation:eqAnim 1s ease-in-out infinite;}
.eq-bar:nth-child(1){animation-delay:0s;}.eq-bar:nth-child(2){animation-delay:.2s;}.eq-bar:nth-child(3){animation-delay:.4s;}
@keyframes eqAnim{0%,100%{height:4px;}50%{height:14px;}}
.eq.paused .eq-bar{animation-play-state:paused;height:8px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

/* PAGE */
.ch-page{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:6rem 2rem 4rem;}
.ch-back{display:inline-flex;align-items:center;gap:.5rem;font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);text-decoration:none;margin-bottom:3rem;transition:color .2s;cursor:none;}
.ch-back:hover{color:var(--gold);}
.ch-back::before{content:'←';}
.ch-page-label{font-size:.65rem;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;}
.ch-page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3rem);font-weight:300;color:var(--cream);margin-bottom:2.5rem;}
.ch-next-page{display:block;margin:3rem auto 0;padding:1rem 3rem;background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:'Jost',sans-serif;font-size:.75rem;letter-spacing:.3em;text-transform:uppercase;cursor:none;position:relative;overflow:hidden;transition:color .3s;text-decoration:none;text-align:center;width:fit-content;}
.ch-next-page::before{content:"";position:absolute;inset:0;background:var(--gold);transform:translateX(-101%);transition:transform .4s cubic-bezier(.77,0,.18,1);z-index:0;}
.ch-next-page:hover::before{transform:translateX(0);}
.ch-next-page:hover{color:var(--deep);}
.ch-next-page span{position:relative;z-index:1;}

/* COUPON CARDS */
.coupon-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;}
.coupon-card{background:var(--mid);border:1px solid rgba(201,169,110,0.15);overflow:hidden;position:relative;transition:border-color .3s,transform .2s;cursor:pointer;}
.coupon-card:hover{border-color:rgba(201,169,110,0.4);transform:translateY(-2px);}
.coupon-card.used{opacity:.6;cursor:not-allowed;}
.coupon-card.used:hover{transform:none;border-color:rgba(201,169,110,0.15);}
.coupon-body{padding:1.5rem 1.5rem 1rem;}
.coupon-icon-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem;}
.coupon-icon{width:44px;height:44px;background:rgba(201,169,110,0.08);border:1px solid rgba(201,169,110,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.coupon-name{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--cream);}
.coupon-desc{font-size:.72rem;color:var(--muted);line-height:1.5;margin-top:.2rem;}
.coupon-status{font-size:.65rem;color:var(--muted);letter-spacing:.1em;margin-top:.5rem;}
.coupon-divider{border-top:1px dashed rgba(201,169,110,0.15);margin:0 1.5rem;}
.coupon-action{padding:.75rem 1.5rem;}
.coupon-btn{width:100%;background:transparent;border:1px solid rgba(201,169,110,0.3);color:var(--gold);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;padding:.55rem;cursor:pointer;font-family:'Jost',sans-serif;transition:all .3s;}
.coupon-btn:hover{background:rgba(201,169,110,0.08);}
.coupon-btn:disabled{opacity:.4;cursor:not-allowed;}
.coupon-stamp{display:none;position:absolute;inset:0;background:rgba(14,11,18,0.75);align-items:center;justify-content:center;}
.coupon-stamp.show{display:flex;}
.stamp-inner{border:2px solid var(--rose);color:var(--rose);font-size:.75rem;letter-spacing:.3em;text-transform:uppercase;padding:.5rem 1.25rem;transform:rotate(-8deg);}

/* BIOSKOP TICKET MODAL */
.ticket-modal{display:none;position:fixed;inset:0;background:rgba(10,8,16,.88);z-index:500;align-items:center;justify-content:center;padding:1.5rem;}
.ticket-modal.show{display:flex;}
.ticket-wrap{width:100%;max-width:380px;animation:ticketIn .5s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes ticketIn{from{opacity:0;transform:scale(.85) translateY(30px);}to{opacity:1;transform:scale(1) translateY(0);}}

/* Ticket body */
.ticket{background:var(--mid);border:1px solid rgba(201,169,110,0.25);position:relative;overflow:hidden;}

/* Top stripe — warna bioskop */
.ticket-top{background:linear-gradient(135deg,#1a0a2e,#2d1b4e);padding:1.75rem 1.75rem 1.5rem;text-align:center;position:relative;overflow:hidden;}
.ticket-top::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(201,169,110,0.03) 8px,rgba(201,169,110,0.03) 16px);}
.ticket-cinema{font-size:.55rem;letter-spacing:.45em;text-transform:uppercase;color:rgba(201,169,110,0.6);margin-bottom:.75rem;position:relative;}
.ticket-icon{font-size:3rem;display:block;margin-bottom:.75rem;position:relative;}
.ticket-valid{font-size:.5rem;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:.35rem;position:relative;}
.ticket-title{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:300;color:var(--cream);line-height:1.1;position:relative;}
.ticket-subtitle{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.85rem;color:var(--muted);margin-top:.35rem;position:relative;}

/* Perforated separator */
.ticket-perf{height:0;border-top:2px dashed rgba(201,169,110,0.2);margin:0;position:relative;}
.ticket-perf::before,.ticket-perf::after{content:'';position:absolute;top:50%;width:20px;height:20px;background:var(--deep);border-radius:50%;transform:translateY(-50%);}
.ticket-perf::before{left:-10px;}
.ticket-perf::after{right:-10px;}

/* Ticket info */
.ticket-info{padding:1.25rem 1.75rem;}
.ticket-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.85rem;}
.ticket-row:last-child{margin-bottom:0;}
.ticket-field{display:flex;flex-direction:column;gap:.2rem;}
.ticket-label{font-size:.5rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);}
.ticket-value{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--cream);}
.ticket-value.gold{color:var(--gold-light);}

/* Barcode */
.ticket-barcode-wrap{padding:.75rem 1.75rem 1rem;border-top:1px solid rgba(201,169,110,0.08);}
.ticket-barcode{display:flex;gap:1.5px;height:36px;margin-bottom:.35rem;}
.ticket-barcode-num{font-size:.55rem;letter-spacing:.15em;color:rgba(201,169,110,0.3);text-align:center;}

/* Buttons */
.ticket-buttons{padding:1rem 1.75rem 1.25rem;display:flex;flex-direction:column;gap:.5rem;}
.btn-claim{background:var(--gold);border:none;color:var(--deep);font-family:'Jost',sans-serif;font-size:.72rem;letter-spacing:.25em;text-transform:uppercase;padding:.85rem;cursor:pointer;transition:opacity .2s;width:100%;}
.btn-claim:hover{opacity:.85;}
.btn-cancel{background:transparent;border:1px solid rgba(201,169,110,0.2);color:var(--muted);font-family:'Jost',sans-serif;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;padding:.65rem;cursor:pointer;transition:all .2s;width:100%;}
.btn-cancel:hover{border-color:var(--gold);color:var(--gold);}

/* Stars decoration */
.ticket-stars{position:absolute;top:.5rem;right:.75rem;font-size:.7rem;color:rgba(201,169,110,0.2);letter-spacing:.1em;}

@keyframes modalIn{from{opacity:0;transform:scale(.9) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
@media(max-width:600px){.coupon-grid{grid-template-columns:1fr;}}
</style>
</head>

<div class="cursor" id="cursor"></div>

<script>
const cursor=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';});
(function a(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(a);})();
const sp=['✦','✧','★','✸','✺'];
document.addEventListener('click',e=>{const el=document.createElement('div');el.className='sparkle';el.textContent=sp[Math.floor(Math.random()*sp.length)];el.style.left=e.clientX+'px';el.style.top=e.clientY+'px';el.style.color='hsl('+(38+Math.random()*20)+','+(60+Math.random()*30)+'%,'+(60+Math.random()*20)+'%)';document.body.appendChild(el);setTimeout(()=>el.remove(),700);});
const cv=document.getElementById('starCanvas'),cx=cv.getContext('2d');let W,H,stars=[],ss=[];
function ic(){W=cv.width=innerWidth;H=cv.height=innerHeight;stars=Array.from({length:200},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.2,a:Math.random(),sp:Math.random()*.003+.001,ph:Math.random()*Math.PI*2}));}
function ds(t){cx.clearRect(0,0,W,H);for(const s of stars){const al=s.a*(.5+.5*Math.sin(t*s.sp*60+s.ph));cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle='rgba(232,213,163,'+al+')';cx.fill();}
for(let i=ss.length-1;i>=0;i--){const s=ss[i];s.x+=s.vx;s.y+=s.vy;s.life--;const al=s.life/s.ml,g=cx.createLinearGradient(s.x,s.y,s.x-s.vx*12,s.y-s.vy*12);g.addColorStop(0,'rgba(232,213,163,'+al+')');g.addColorStop(1,'rgba(232,213,163,0)');cx.beginPath();cx.strokeStyle=g;cx.lineWidth=1.5;cx.moveTo(s.x,s.y);cx.lineTo(s.x-s.vx*12,s.y-s.vy*12);cx.stroke();if(s.life<=0)ss.splice(i,1);}
if(Math.random()<.004&&ss.length<3){const a=-Math.PI/6+(Math.random()-.5)*.4;ss.push({x:Math.random()*W,y:Math.random()*H*.5,vx:Math.cos(a)*8,vy:Math.sin(a)*8+4,life:60,ml:60});}requestAnimationFrame(ds);}
ic();addEventListener('resize',ic);requestAnimationFrame(ds);
const pc=document.getElementById('petals');
function cp(){const p=document.createElement('div');p.className='petal';const sz=4+Math.random()*6;p.style.left=Math.random()*100+'vw';p.style.width=sz+'px';p.style.height=(sz*1.4)+'px';p.style.background='rgba('+(181+Math.random()*20)+','+(99+Math.random()*20)+','+(106+Math.random()*10)+',.4)';const dur=8+Math.random()*8;p.style.animationDuration=dur+'s';p.style.animationDelay=Math.random()*5+'s';pc.appendChild(p);setTimeout(()=>p.remove(),(dur+5)*1000);}
setInterval(cp,600);for(let i=0;i<8;i++)cp();
const toastEl=document.getElementById('toast');let tt;
function showToast(m){toastEl.textContent=m;toastEl.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>toastEl.classList.remove('show'),3000);}

// MUSIC via parent iframe
function updateEq(p){const e=document.getElementById('eq');p?e.classList.remove('paused'):e.classList.add('paused');}
window.addEventListener('message',function(e){if(!e.data||e.data.type!=='MUSIC_STATUS')return;updateEq(e.data.playing);});
window.addEventListener('load',()=>{if(window.parent!==window)window.parent.postMessage({type:'GET_STATUS'},'*');});
document.getElementById('musicBtn').addEventListener('click',()=>{
  if(window.parent!==window){window.parent.postMessage({type:'MUSIC_TOGGLE'},'*');showToast("♪ Keshi — It's You");}
});
document.addEventListener('click',function(e){
  const link=e.target.closest('a');
  if(!link)return;
  const href=link.getAttribute('href');
  if(!href||href.startsWith('#')||href.startsWith('javascript'))return;
  if(window.parent!==window){
    e.preventDefault();
    const url=new URL(href,window.location.href).href;
    window.parent.postMessage({type:'NAVIGATE',url},'*');
  }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL='https://urznpphqbdmwgnbhrzdi.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyem5wcGhxYmRtd2duYmhyemRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NjczNTYsImV4cCI6MjA5MjU0MzM1Nn0.0kymrIh-8qrl68bDtZqjkI7Ke5mQLrH280zWfzF6UQ8';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{realtime:{params:{eventsPerSecond:10}}});

const COUPONS=[
  {icon:'🍽️',title:'Makan Gratis',desc:'Pilih restoran apapun, aku yang bayar. Tanpa syarat.'},
  {icon:'🎬',title:'Nonton Bareng',desc:'Film apapun pilihanmu. Aku temenin sampai credits habis.'},
  {icon:'🤗',title:'Pelukan Gratis',desc:'Kapanpun kamu mau. Stok tidak pernah habis.'},
  {icon:'🌙',title:'Temenin Begadang',desc:'Kalau kamu nggak bisa tidur, aku temenin sampai pagi.'},
  {icon:'🛒',title:'Belanja Bareng',desc:'Kamu pilih, aku yang sabar nemenin. Janji nggak ngeluh.'},
  {icon:'💆',title:'Hari Bebas Drama',desc:'Satu hari penuh tanpa berantem, apapun yang terjadi.'},
];

// claims = array of {coupon_idx, claimed_at, id}
let claims=[];
let pendingIdx=-1;

async function loadClaims(){
  const{data,error}=await sb.from('coupon_claims').select('*').order('claimed_at',{ascending:false});
  if(error){console.error(error);return;}
  claims=data||[];
  renderCoupons();
}

function getActiveClaim(idx){
  const now=new Date();
  return claims.find(c=>{
    if(c.coupon_idx!==idx)return false;
    const diff=now-new Date(c.claimed_at);
    return diff<30*24*3600*1000;
  });
}

function cooldownDays(claimedAt){
  const next=new Date(new Date(claimedAt).getTime()+30*24*3600*1000);
  return Math.ceil((next-new Date())/86400000);
}

function renderCoupons(){
  const grid=document.getElementById('coupon-grid');
  let used=0;
  grid.innerHTML=COUPONS.map((c,i)=>{
    const active=getActiveClaim(i);
    const isUsed=!!active;
    if(isUsed)used++;
    const days=isUsed?cooldownDays(active.claimed_at):null;
    return `<div class="coupon-card${isUsed?' used':''}" onclick="${isUsed?'':'claimCoupon('+i+')'}">
      <div class="coupon-body">
        <div class="coupon-icon-row">
          <div class="coupon-icon">${c.icon}</div>
          <div>
            <div class="coupon-name">${c.title}</div>
            <div class="coupon-desc">${c.desc}</div>
          </div>
        </div>
        <div class="coupon-status">${isUsed?'Cooldown — '+days+' hari lagi':''}</div>
      </div>
      <div class="coupon-divider"></div>
      <div class="coupon-action">
        <button class="coupon-btn" ${isUsed?'disabled':''} onclick="event.stopPropagation();${isUsed?'':'claimCoupon('+i+')'}">
          ${isUsed?'Cooldown — '+days+' hari lagi':'Gunakan Kupon'}
        </button>
      </div>
      <div class="coupon-stamp${isUsed?' show':''}"><div class="stamp-inner">DIPAKAI</div></div>
    </div>`;
  }).join('');
  document.getElementById('coupon-summary').textContent=used+' dari 6 kupon digunakan bulan ini';
}

// REALTIME
sb.channel('coupons-realtime')
  .on('postgres_changes',{event:'INSERT',schema:'public',table:'coupon_claims'},payload=>{
    if(!claims.find(c=>c.id===payload.new.id)){
      claims.unshift(payload.new);
      renderCoupons();
      showToast('Kupon #'+(payload.new.coupon_idx+1)+' baru diklaim ✦');
    }
  })
  .on('postgres_changes',{event:'DELETE',schema:'public',table:'coupon_claims'},payload=>{
    claims=claims.filter(c=>c.id!==payload.old.id);
    renderCoupons();
  })
  .subscribe();

// TICKET MODAL
function claimCoupon(i){
  if(getActiveClaim(i))return;
  pendingIdx=i;
  const c=COUPONS[i];
  const now=new Date();
  const exp=new Date(now.getTime()+30*24*3600*1000);

  document.getElementById('tkt-icon').textContent=c.icon;
  document.getElementById('tkt-title').textContent=c.title;
  document.getElementById('tkt-subtitle').textContent=c.desc;
  document.getElementById('tkt-issued').textContent=now.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
  document.getElementById('tkt-expiry').textContent=exp.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});

  // barcode
  const bc=document.getElementById('tkt-barcode');
  bc.innerHTML='';
  let barcodeNum='';
  for(let b=0;b<48;b++){
    const bar=document.createElement('div');
    const w=Math.random()>0.5?2:1;
    bar.style.cssText='width:'+w+'px;height:100%;background:var(--gold-light);opacity:'+(0.25+Math.random()*.75)+';flex-shrink:0;';
    bc.appendChild(bar);
    if(b%4===0)barcodeNum+=Math.floor(Math.random()*10);
  }
  document.getElementById('tkt-barcode-num').textContent=barcodeNum;

  document.getElementById('ticketModal').classList.add('show');
}

async function confirmClaim(){
  if(pendingIdx<0)return;
  const{data,error}=await sb.from('coupon_claims').insert({coupon_idx:pendingIdx}).select().single();
  if(error){showToast('Gagal mengklaim kupon');console.error(error);return;}
  claims.unshift(data);
  closeTicket();
  renderCoupons();
  showToast('Kupon diklaim! Tagih sekarang ya 😉');
}
// RESET ALL COUPONS
  async function resetAllCoupons(){
  if(!confirm('Reset semua kupon?'))return;
  await sb.from('coupon_claims').delete().neq('id','00000000-0000-0000-0000-000000000000');
  claims=[];
  renderCoupons();
  showToast('Semua kupon direset ✦');
}

function closeTicket(){
  document.getElementById('ticketModal').classList.remove('show');
  pendingIdx=-1;
}

document.getElementById('ticketModal').addEventListener('click',function(e){if(e.target===this)closeTicket();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeTicket();});

loadClaims();
</script>
